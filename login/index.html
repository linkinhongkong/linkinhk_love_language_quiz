<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>會員登入 · Link in HK</title>
  <meta name="description" content="Link in HK 會員登入" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="/shared/config.js"></script>
  <style>
    /* Login page-specific styles. Tokens + shared components come from design-system.css. */

    .login-header {
      padding: 36px 24px 0;
      text-align: center;
    }
    .login-logo { height: 22px; opacity: 0.8; margin-bottom: 24px; }
    .login-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .login-subtitle { font-size: 14px; color: var(--text-light); line-height: 1.7; }
    .login-subtitle-strong { color: var(--text); font-weight: 600; }

    .login-body { padding: 24px 24px 8px; }
    .login-nav-row { padding: 8px 24px 20px; }

    .otp-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--accent-soft);
      border: 2px solid rgba(144, 96, 224, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 16px;
    }

    .code-input {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.4em;
      padding: 16px;
      font-family: var(--font-accent);
    }

    .error-box {
      margin-bottom: 16px;
      padding: 12px;
      background: var(--red-bg);
      border: 1px solid #fecaca;
      border-radius: 10px;
      font-size: 13px;
      color: #b91c1c;
    }

    .login-meta {
      margin-top: 4px;
      padding-top: 16px;
      border-top: 1px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .login-link {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 13px;
      color: var(--text-light);
      cursor: pointer;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .login-link:hover { color: var(--accent); }
    .login-link.underline { text-decoration: underline; text-underline-offset: 2px; }
    .login-link:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-footer {
      padding: 16px 24px 24px;
      text-align: center;
      border-top: 1px solid var(--border-light);
    }
    .login-footer-text { font-size: 13px; color: var(--text-light); line-height: 1.7; }
    .login-footer-text a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .login-footer-text a:hover { text-decoration: underline; text-underline-offset: 2px; }

    .check-screen { padding: 64px 24px; text-align: center; }

    .debug-box {
      background: var(--chip-bg);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      text-align: left;
    }
    .debug-box-label { font-size: 11px; color: var(--text-light); margin-bottom: 4px; }
    .debug-box-value {
      font-size: 11px;
      color: var(--text-hint);
      font-family: var(--font-accent);
      word-break: break-all;
    }

    .site-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
      margin-top: 16px;
      font-family: var(--font-accent);
      letter-spacing: 0.5px;
    }

    @media (max-width: 500px) {
      .login-header { padding: 28px 20px 0; }
      .login-body { padding: 20px 20px 4px; }
      .login-nav-row { padding: 8px 20px 18px; }
      .login-footer { padding: 14px 20px 22px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const REQUEST_OTP_URL = window.webhookUrl("request-otp");
    const VERIFY_OTP_URL = window.webhookUrl("verify-otp");

    function LoginPage() {
      // screens: "checking" | "email" | "code" | "loggedIn"
      const [screen, setScreen] = useState("checking");

      const [email, setEmail] = useState("");
      const [code, setCode] = useState("");

      // status: "idle" | "loading" | "error"
      const [status, setStatus] = useState("idle");
      const [errorMsg, setErrorMsg] = useState("");

      const [loggedInEmail, setLoggedInEmail] = useState("");

      const codeInputRef = useRef(null);

      useEffect(() => {
        if (screen === "code" && codeInputRef.current) {
          setTimeout(() => codeInputRef.current.focus(), 100);
        }
      }, [screen]);

      // Optimistic redirect on page load: if a token exists, trust it and
      // go to dashboard. Dashboard bootstrap will bounce back here if invalid.
      useEffect(() => {
        const savedToken = localStorage.getItem("linkinhk_token");
        if (savedToken) {
          window.location.href = "/dashboard";
          return;
        }
        setScreen("email");
      }, []);

      const handleEmailSubmit = async () => {
        if (!email.trim()) {
          setErrorMsg("請輸入電郵地址");
          setStatus("error");
          return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email.trim())) {
          setErrorMsg("電郵格式不正確");
          setStatus("error");
          return;
        }

        setStatus("loading");
        setErrorMsg("");

        try {
          const res = await fetch(REQUEST_OTP_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email.trim().toLowerCase() })
          });

          const data = await res.json();

          if (res.status === 429) {
            setErrorMsg(data.error || "請稍候再試");
            setStatus("error");
            return;
          }

          if (data.success) {
            setStatus("idle");
            setScreen("code");
          } else {
            setErrorMsg(data.error || "發生錯誤,請稍後再試");
            setStatus("error");
          }
        } catch (err) {
          setErrorMsg("網絡連線錯誤,請稍後再試");
          setStatus("error");
        }
      };

      const handleCodeSubmit = async () => {
        if (code.length !== 6) {
          setErrorMsg("請輸入 6 位數字驗證碼");
          setStatus("error");
          return;
        }

        setStatus("loading");
        setErrorMsg("");

        try {
          const res = await fetch(VERIFY_OTP_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              email: email.trim().toLowerCase(),
              code: code.trim()
            })
          });

          const data = await res.json();

          if (data.success && data.token) {
            localStorage.setItem("linkinhk_token", data.token);
            localStorage.setItem("linkinhk_email", data.email);
            window.location.href = "/dashboard";
            return;
          } else {
            setErrorMsg(data.error || "驗證失敗,請再試");
            setStatus("error");
            setCode("");
            setTimeout(() => codeInputRef.current?.focus(), 100);
          }
        } catch (err) {
          setErrorMsg("網絡連線錯誤,請稍後再試");
          setStatus("error");
        }
      };

      const handleResend = async () => {
        setStatus("loading");
        setErrorMsg("");
        setCode("");

        try {
          const res = await fetch(REQUEST_OTP_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email: email.trim().toLowerCase() })
          });

          const data = await res.json();

          if (res.status === 429) {
            setErrorMsg(data.error || "請稍候再試");
            setStatus("error");
            return;
          }

          setStatus("idle");
          setErrorMsg("");
        } catch (err) {
          setErrorMsg("網絡連線錯誤");
          setStatus("error");
        }
      };

      const handleLogout = () => {
        localStorage.removeItem("linkinhk_token");
        localStorage.removeItem("linkinhk_email");
        setLoggedInEmail("");
        setEmail("");
        setCode("");
        setScreen("email");
        setStatus("idle");
        setErrorMsg("");
      };

      const handleBackToEmail = () => {
        setCode("");
        setStatus("idle");
        setErrorMsg("");
        setScreen("email");
      };

      const handleEmailKeyDown = (e) => {
        if (e.key === "Enter" && status !== "loading") handleEmailSubmit();
      };

      const handleCodeKeyDown = (e) => {
        if (e.key === "Enter" && status !== "loading") handleCodeSubmit();
      };

      const handleCodeChange = (e) => {
        const val = e.target.value.replace(/\D/g, "").slice(0, 6);
        setCode(val);
        if (status === "error") {
          setStatus("idle");
          setErrorMsg("");
        }
      };

      return (
        <div className="form-root">
          <div style={{ width: "100%", maxWidth: 480 }}>
            <div className="page-card">

              {/* ---------- CHECKING ---------- */}
              {screen === "checking" && (
                <div className="check-screen fade-in">
                  <div className="spinner" style={{ margin: "0 auto 16px" }} />
                  <p style={{ fontSize: 14, color: "var(--text-light)" }}>檢查登入狀態中...</p>
                </div>
              )}

              {/* ---------- EMAIL ---------- */}
              {screen === "email" && (
                <div className="fade-in" key="email">
                  <div className="login-header">
                    <img src="/logo.png" alt="Link in HK" className="login-logo" />
                    <div className="login-title">會員登入</div>
                    <div className="login-subtitle">
                      輸入你的電郵,我哋會寄一個驗證碼俾你 ✉️
                    </div>
                  </div>

                  <div className="login-body">
                    <div className="field" style={{ marginBottom: 16 }}>
                      <label className="field-label">電郵地址</label>
                      <input
                        type="email"
                        className="text-input"
                        value={email}
                        onChange={(e) => {
                          setEmail(e.target.value);
                          if (status === "error") setStatus("idle");
                        }}
                        onKeyDown={handleEmailKeyDown}
                        placeholder="you@example.com"
                        disabled={status === "loading"}
                      />
                    </div>

                    {status === "error" && (
                      <div className="error-box fade-in">{errorMsg}</div>
                    )}
                  </div>

                  <div className="login-nav-row">
                    <button
                      onClick={handleEmailSubmit}
                      disabled={status === "loading"}
                      className="nav-btn primary"
                      style={{ width: "100%" }}
                    >
                      {status === "loading" ? "傳送緊..." : "傳送驗證碼 ✨"}
                    </button>
                  </div>

                  <div className="login-footer">
                    <div className="login-footer-text">
                      仲未係會員?{" "}
                      <a href="https://www.linkinhk.com/join">即刻登記 💜</a>
                    </div>
                  </div>
                </div>
              )}

              {/* ---------- CODE ---------- */}
              {screen === "code" && (
                <div className="fade-in" key="code">
                  <div className="login-header">
                    <div className="otp-icon">📬</div>
                    <div className="login-title">輸入驗證碼</div>
                    <div className="login-subtitle">
                      我哋已經寄咗 6 位數字驗證碼去<br/>
                      <span className="login-subtitle-strong">{email}</span>
                    </div>
                  </div>

                  <div className="login-body">
                    <div className="field" style={{ marginBottom: 16 }}>
                      <input
                        ref={codeInputRef}
                        type="text"
                        inputMode="numeric"
                        autoComplete="one-time-code"
                        className="text-input code-input"
                        value={code}
                        onChange={handleCodeChange}
                        onKeyDown={handleCodeKeyDown}
                        placeholder="000000"
                        disabled={status === "loading"}
                      />
                    </div>

                    {status === "error" && (
                      <div className="error-box fade-in">{errorMsg}</div>
                    )}

                    <div className="login-meta">
                      <button onClick={handleBackToEmail} className="login-link">
                        ← 返回
                      </button>
                      <button
                        onClick={handleResend}
                        disabled={status === "loading"}
                        className="login-link underline"
                      >
                        重新傳送驗證碼
                      </button>
                    </div>
                  </div>

                  <div className="login-nav-row">
                    <button
                      onClick={handleCodeSubmit}
                      disabled={status === "loading" || code.length !== 6}
                      className="nav-btn primary"
                      style={{ width: "100%" }}
                    >
                      {status === "loading" ? "驗證緊..." : "登入 💜"}
                    </button>
                  </div>
                </div>
              )}

              {/* ---------- LOGGED IN ---------- */}
              {screen === "loggedIn" && (
                <div className="fade-in" key="loggedIn">
                  <div className="success-screen">
                    <div className="success-icon">✓</div>
                    <div className="success-title">登入成功!</div>
                    <div className="success-subtitle">
                      歡迎返嚟,<br/>
                      <span className="login-subtitle-strong">{loggedInEmail}</span>
                    </div>
                  </div>

                  <div className="login-body">
                    <div className="debug-box">
                      <div className="debug-box-label">Session token (debug):</div>
                      <div className="debug-box-value">
                        {localStorage.getItem("linkinhk_token")?.slice(0, 32)}...
                      </div>
                    </div>
                    <p style={{ fontSize: 12, color: "var(--text-light)", textAlign: "center" }}>
                      會員專區仲未起好,呢度只係測試登入成功 ✨
                    </p>
                  </div>

                  <div className="login-nav-row">
                    <button
                      onClick={handleLogout}
                      className="nav-btn secondary"
                      style={{ width: "100%" }}
                    >
                      登出
                    </button>
                  </div>
                </div>
              )}

            </div>

            <div className="site-footer">Link in HK · linkinhk.com</div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<LoginPage />);
  </script>
</body>
</html>
