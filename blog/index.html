<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog · Link in HK</title>
  <meta name="description" content="關於拍拖、相處同自我認識嘅文章 — 由 Link in HK 團隊整理。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <script src="/shared/config.js"></script>
</head>
<body class="marketing-body">

  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="site-logo" aria-label="Link in HK 首頁">
        <img src="/logo.png" alt="Link in HK" />
      </a>
      <nav class="site-nav">
        <a href="/blog/" class="site-nav-link">Blog</a>
        <a href="/login/" class="site-nav-cta">會員登入</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="section-head-center">
      <span class="section-kicker">BLOG</span>
      <h1 class="section-title">寫比單身緊嘅你</h1>
      <p class="section-subtitle">
        由「點解 ghost」到「first date 去邊」— 每一個單身嘅人都諗過嘅問題
      </p>
    </div>

    <div id="tag-filter" class="tag-filter-row"></div>

    <div id="blog-grid" class="blog-grid cols-2"></div>
  </section>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <div>© Link in HK · 香港最有溫度嘅 AI 配對服務</div>
      <div class="site-footer-links">
        <a href="/">首頁</a>
        <a href="https://ig.me/m/linkinhk" target="_blank" rel="noopener">IG @linkinhk</a>
        <a href="/login/">會員登入</a>
      </div>
    </div>
  </footer>

  <script>
    (function () {
      var grid = document.getElementById('blog-grid');
      var filterRow = document.getElementById('tag-filter');
      var allPosts = [];
      var activeTag = null;

      fetch('/blog/posts.json', { cache: 'no-cache' })
        .then(function (r) { return r.ok ? r.json() : []; })
        .then(function (posts) {
          allPosts = (Array.isArray(posts) ? posts : []).slice().sort(function (a, b) {
            return (b.date || '').localeCompare(a.date || '');
          });
          renderTags();
          renderGrid();
        })
        .catch(function () { renderEmpty(); });

      function renderTags() {
        var tagSet = {};
        allPosts.forEach(function (p) {
          (p.tags || []).forEach(function (t) { tagSet[t] = true; });
        });
        var tags = Object.keys(tagSet);
        if (tags.length === 0) { filterRow.style.display = 'none'; return; }
        var all = makeFilter('全部', null);
        filterRow.appendChild(all);
        tags.forEach(function (t) { filterRow.appendChild(makeFilter(t, t)); });
      }

      function makeFilter(label, value) {
        var btn = document.createElement('button');
        btn.className = 'tag-filter' + (value === activeTag ? ' active' : '');
        btn.textContent = label;
        btn.addEventListener('click', function () {
          activeTag = value;
          Array.prototype.forEach.call(filterRow.children, function (el) { el.classList.remove('active'); });
          btn.classList.add('active');
          renderGrid();
        });
        return btn;
      }

      function renderGrid() {
        grid.innerHTML = '';
        var visible = activeTag
          ? allPosts.filter(function (p) { return (p.tags || []).indexOf(activeTag) !== -1; })
          : allPosts;
        if (visible.length === 0) { renderEmpty(); return; }
        visible.forEach(function (post) {
          var card = document.createElement('a');
          card.className = 'blog-card';
          card.href = post.url || ('/blog/post.html?slug=' + encodeURIComponent(post.slug));
          var tagsHtml = (post.tags || [])
            .map(function (t) { return '<span class="blog-card-tag">' + escapeHtml(t) + '</span>'; })
            .join('');
          card.innerHTML =
            '<div class="blog-card-strip"></div>' +
            '<div class="blog-card-body">' +
              '<div class="blog-card-meta"><span>' + formatDate(post.date) + '</span></div>' +
              '<div class="blog-card-title">' + escapeHtml(post.title || '') + '</div>' +
              (post.subtitle ? '<div class="blog-card-subtitle">' + escapeHtml(post.subtitle) + '</div>' : '') +
              (post.excerpt ? '<div class="blog-card-excerpt">' + escapeHtml(post.excerpt) + '</div>' : '') +
              (tagsHtml ? '<div class="blog-card-tags">' + tagsHtml + '</div>' : '') +
            '</div>';
          grid.appendChild(card);
        });
      }

      function renderEmpty() {
        grid.innerHTML = '<div class="blog-empty">新文章準備中 ✍️</div>';
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, function (c) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
        });
      }
      function formatDate(s) {
        if (!s) return '';
        var d = new Date(s);
        if (isNaN(d.getTime())) return escapeHtml(s);
        return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0');
      }
    })();
  </script>
</body>
</html>
