<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員專區 · Link in HK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
      background-color: #fafaf9;
      /* Padding for fixed bottom nav */
      padding-bottom: 80px;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spin {
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Range slider track */
    .range-track {
      background: linear-gradient(to right, #fef3c7, #fbbf24, #fef3c7);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const GET_PROFILE_URL = "https://linkinhk.app.n8n.cloud/webhook/get-profile";

    // ---------------- Icon components ----------------
    const HeartIcon = ({ className }) => (
      <svg className={className} fill="currentColor" viewBox="0 0 20 20">
        <path fillRule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clipRule="evenodd" />
      </svg>
    );
    const CalendarIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
    );
    const HistoryIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    );
    const UserIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    );
    const PencilIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
      </svg>
    );
    const LogoutIcon = ({ className }) => (
      <svg className={className} fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
        <path strokeLinecap="round" strokeLinejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
    );

    // ---------------- Reusable components ----------------
    function Field({ label, value, editable = true, onEdit }) {
      return (
        <div className="flex items-start justify-between py-3 border-b border-stone-100">
          <div className="flex-1 min-w-0 pr-3">
            <div className="text-xs text-stone-500 mb-1">{label}</div>
            <div className="text-stone-900 break-words">
              {value || <span className="text-stone-300">—</span>}
            </div>
          </div>
          {editable && (
            <button
              onClick={onEdit}
              className="text-stone-400 hover:text-stone-700 transition p-1 flex-shrink-0"
              title="編輯"
            >
              <PencilIcon className="w-4 h-4" />
            </button>
          )}
        </div>
      );
    }

    function ChipsField({ label, value, editable = true }) {
      const chips = String(value || "").split(",").map(s => s.trim()).filter(Boolean);
      return (
        <div className="flex items-start justify-between py-3 border-b border-stone-100">
          <div className="flex-1 min-w-0 pr-3">
            <div className="text-xs text-stone-500 mb-2">{label}</div>
            {chips.length > 0 ? (
              <div className="flex flex-wrap gap-1.5">
                {chips.map((chip, i) => (
                  <span key={i} className="inline-block px-2.5 py-1 bg-stone-100 text-stone-700 text-xs rounded-full">
                    {chip}
                  </span>
                ))}
              </div>
            ) : (
              <div className="text-stone-300">—</div>
            )}
          </div>
          {editable && (
            <button className="text-stone-400 hover:text-stone-700 transition p-1 flex-shrink-0">
              <PencilIcon className="w-4 h-4" />
            </button>
          )}
        </div>
      );
    }

    function Toggle({ on, onChange, disabled = false }) {
      return (
        <button
          onClick={!disabled ? onChange : undefined}
          className={`relative inline-flex h-5 w-9 items-center rounded-full transition ${
            on ? "bg-yellow-400" : "bg-stone-200"
          } ${disabled ? "opacity-80 cursor-default" : "cursor-pointer"}`}
        >
          <span
            className={`inline-block h-4 w-4 transform rounded-full bg-white shadow transition ${
              on ? "translate-x-[18px]" : "translate-x-0.5"
            }`}
          />
        </button>
      );
    }

    function WantField({ label, value, fieldKey, dealBreakers, hideToggle = false, children }) {
      const isDealBreaker = dealBreakers.includes(fieldKey);
      return (
        <div className="py-3 border-b border-stone-100">
          <div className="flex items-center justify-between mb-2">
            <div className="text-xs text-stone-500">{label}</div>
            <div className="flex items-center gap-2">
              {!hideToggle && (
                <>
                  <span className="text-[11px] text-stone-400">Deal breaker</span>
                  <Toggle on={isDealBreaker} disabled />
                </>
              )}
              <button className="text-stone-400 hover:text-stone-700 transition p-1">
                <PencilIcon className="w-4 h-4" />
              </button>
            </div>
          </div>
          <div className="text-stone-900 break-words">
            {children || value || <span className="text-stone-300">—</span>}
          </div>
        </div>
      );
    }

    function RangeDisplay({ min, max, unit }) {
      return (
        <div>
          <div className="text-center font-medium text-stone-900 mb-2">
            {min || "—"}{unit} <span className="text-stone-400 mx-1">至</span> {max || "—"}{unit}
          </div>
          <div className="h-2 range-track rounded-full"></div>
        </div>
      );
    }

    // ---------------- Tabs ----------------
    const TABS = [
      { id: "match", label: "配對", Icon: HeartIcon },
      { id: "events", label: "活動", Icon: CalendarIcon },
      { id: "history", label: "紀錄", Icon: HistoryIcon },
      { id: "profile", label: "我", Icon: UserIcon },
    ];

    // ---------------- Main App ----------------
    function Dashboard() {
      const [loading, setLoading] = useState(true);
      const [profile, setProfile] = useState(null);
      const [error, setError] = useState(null);
      const [activeTab, setActiveTab] = useState("match");
      const [profileSubTab, setProfileSubTab] = useState("me"); // "me" | "want"

      // ---------------- Hash routing ----------------
      useEffect(() => {
        const handleHash = () => {
          const hash = window.location.hash.replace("#", "");
          if (TABS.some(t => t.id === hash)) {
            setActiveTab(hash);
          } else {
            setActiveTab("match");
          }
        };
        handleHash();
        window.addEventListener("hashchange", handleHash);
        return () => window.removeEventListener("hashchange", handleHash);
      }, []);

      // ---------------- Fetch profile on load ----------------
      useEffect(() => {
        const fetchProfile = async () => {
          const token = localStorage.getItem("linkinhk_token");

          if (!token) {
            window.location.href = "/login";
            return;
          }

          try {
            const res = await fetch(GET_PROFILE_URL, {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
              },
              body: JSON.stringify({})
            });

            if (res.status === 401) {
              localStorage.removeItem("linkinhk_token");
              localStorage.removeItem("linkinhk_email");
              window.location.href = "/login";
              return;
            }

            const data = await res.json();

            if (data.success && data.profile) {
              setProfile(data.profile);
            } else {
              setError(data.error || "載入失敗");
            }
          } catch (err) {
            console.error(err);
            setError("網絡連線錯誤");
          } finally {
            setLoading(false);
          }
        };

        fetchProfile();
      }, []);

      const changeTab = (tabId) => {
        window.location.hash = tabId;
      };

      const handleLogout = () => {
        localStorage.removeItem("linkinhk_token");
        localStorage.removeItem("linkinhk_email");
        window.location.href = "/login";
      };

      // ---------------- Loading state ----------------
      if (loading) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center">
            <div className="w-10 h-10 border-4 border-stone-200 border-t-stone-900 rounded-full spin mb-4"></div>
            <p className="text-sm text-stone-500">載入中...</p>
          </div>
        );
      }

      // ---------------- Error state ----------------
      if (error) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center px-6">
            <div className="text-5xl mb-4">⚠️</div>
            <p className="text-stone-700 mb-4">{error}</p>
            <button
              onClick={() => window.location.reload()}
              className="bg-stone-900 text-white px-6 py-2 rounded-lg text-sm"
            >
              重新載入
            </button>
          </div>
        );
      }

      return (
        <div className="min-h-screen">
          {/* Header */}
          <header className="bg-white border-b border-stone-200 sticky top-0 z-10">
            <div className="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
              <img src="/logo.png" alt="Link in HK" className="h-7 w-auto" />
              <div className="text-xs text-stone-500 truncate ml-3">
                {profile?.email}
              </div>
            </div>
          </header>

          {/* Main content */}
          <main className="max-w-2xl mx-auto px-4 py-6">
            {activeTab === "match" && <MatchTab />}
            {activeTab === "events" && <EventsTab />}
            {activeTab === "history" && <HistoryTab />}
            {activeTab === "profile" && (
              <ProfileTab
                profile={profile}
                subTab={profileSubTab}
                setSubTab={setProfileSubTab}
                onLogout={handleLogout}
              />
            )}
          </main>

          {/* Bottom nav */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 z-20">
            <div className="max-w-2xl mx-auto flex justify-around">
              {TABS.map(({ id, label, Icon }) => (
                <button
                  key={id}
                  onClick={() => changeTab(id)}
                  className={`flex-1 flex flex-col items-center justify-center py-2.5 transition ${
                    activeTab === id ? "text-stone-900" : "text-stone-400"
                  }`}
                >
                  <Icon className="w-6 h-6 mb-0.5" />
                  <span className="text-[11px] font-medium">{label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    // ---------------- Placeholder tabs ----------------
    function Placeholder({ emoji, title }) {
      return (
        <div className="fade-in flex flex-col items-center justify-center py-20">
          <div className="text-6xl mb-4">{emoji}</div>
          <h2 className="text-xl font-semibold text-stone-700 mb-2">{title}</h2>
          <p className="text-sm text-stone-500">建設緊,敬請期待 ✨</p>
        </div>
      );
    }
    const MatchTab = () => <Placeholder emoji="💘" title="配對" />;
    const EventsTab = () => <Placeholder emoji="📅" title="活動" />;
    const HistoryTab = () => <Placeholder emoji="🕐" title="配對紀錄" />;

    // ---------------- Profile tab ----------------
    function ProfileTab({ profile, subTab, setSubTab, onLogout }) {
      const dealBreakers = String(profile["deal-breaker"] || "")
        .split(",")
        .map(s => s.trim())
        .filter(Boolean);

      return (
        <div className="fade-in">
          {/* Sub-tabs */}
          <div className="bg-white rounded-xl border border-stone-200 p-1 flex mb-4">
            <button
              onClick={() => setSubTab("me")}
              className={`flex-1 py-2 text-sm font-medium rounded-lg transition ${
                subTab === "me"
                  ? "bg-stone-900 text-white"
                  : "text-stone-500 hover:text-stone-900"
              }`}
            >
              我自己
            </button>
            <button
              onClick={() => setSubTab("want")}
              className={`flex-1 py-2 text-sm font-medium rounded-lg transition ${
                subTab === "want"
                  ? "bg-stone-900 text-white"
                  : "text-stone-500 hover:text-stone-900"
              }`}
            >
              我想要
            </button>
          </div>

          {subTab === "me" ? <WhoIAm profile={profile} /> : <WhatIWant profile={profile} dealBreakers={dealBreakers} />}

          {/* Logout button */}
          <button
            onClick={onLogout}
            className="w-full mt-6 bg-white hover:bg-stone-50 border border-stone-300 text-stone-700 font-medium py-3 px-4 rounded-xl transition flex items-center justify-center gap-2"
          >
            <LogoutIcon className="w-4 h-4" />
            登出
          </button>
        </div>
      );
    }

    // ---------------- Bottom Sheet ----------------
    function BottomSheet({ open, title, fields, profile, onClose }) {
      // Local edit state - resets each time sheet opens
      const [values, setValues] = useState({});

      useEffect(() => {
        if (open) {
          const initial = {};
          fields.forEach(f => {
            initial[f.key] = profile[f.key] || "";
          });
          setValues(initial);
          // Lock body scroll
          document.body.style.overflow = "hidden";
        } else {
          document.body.style.overflow = "";
        }
        return () => { document.body.style.overflow = ""; };
      }, [open]);

      if (!open) return null;

      const handleChange = (key, val) => {
        setValues(prev => ({ ...prev, [key]: val }));
      };

      const handleSave = () => {
        // No-op for now - write workflow comes next iteration
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-end justify-center">
          {/* Backdrop */}
          <div
            className="absolute inset-0 bg-black/40 fade-in"
            onClick={onClose}
          />

          {/* Sheet */}
          <div className="relative bg-white w-full max-w-2xl rounded-t-2xl flex flex-col fade-in" style={{ maxHeight: "90vh" }}>
            {/* Sticky header */}
            <div className="sticky top-0 bg-white border-b border-stone-200 px-5 py-4 flex items-center justify-between rounded-t-2xl">
              <h3 className="font-semibold text-stone-900">{title}</h3>
              <button
                onClick={onClose}
                className="text-stone-400 hover:text-stone-700 p-1"
              >
                <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>

            {/* Scrollable body */}
            <div className="overflow-y-auto px-5 py-4 flex-1">
              {fields.map(f => (
                <div key={f.key} className="mb-4">
                  <label className="block text-xs text-stone-500 mb-1.5">
                    {f.label}
                    {f.readOnly && <span className="ml-2 text-stone-400">(不可修改)</span>}
                  </label>
                  {f.type === "textarea" ? (
                    <textarea
                      value={values[f.key] || ""}
                      onChange={(e) => handleChange(f.key, e.target.value)}
                      disabled={f.readOnly}
                      rows={4}
                      className="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition disabled:bg-stone-50 disabled:text-stone-400 resize-none"
                    />
                  ) : (
                    <input
                      type="text"
                      value={values[f.key] || ""}
                      onChange={(e) => handleChange(f.key, e.target.value)}
                      disabled={f.readOnly}
                      className="w-full px-3 py-2 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:border-transparent transition disabled:bg-stone-50 disabled:text-stone-400"
                    />
                  )}
                </div>
              ))}
            </div>

            {/* Sticky footer */}
            <div className="sticky bottom-0 bg-white border-t border-stone-200 px-5 py-3">
              <button
                onClick={handleSave}
                className="w-full bg-stone-900 hover:bg-stone-800 text-white font-medium py-3 rounded-lg transition"
              >
                保存
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ---------------- Card wrapper ----------------
    function Card({ icon, title, helper, onEdit, children }) {
      return (
        <div className="bg-white rounded-xl border border-stone-200 p-5 mb-3">
          {(title || onEdit) && (
            <div className="flex items-start justify-between mb-1">
              {title && (
                <h3 className="font-semibold text-stone-900">
                  {icon && <span className="mr-1.5">{icon}</span>}
                  {title}
                </h3>
              )}
              {onEdit && (
                <button
                  onClick={onEdit}
                  className="text-stone-400 hover:text-stone-700 transition p-1 -mt-1 -mr-1"
                  title="編輯"
                >
                  <PencilIcon className="w-4 h-4" />
                </button>
              )}
            </div>
          )}
          {helper && (
            <p className="text-xs text-stone-500 mb-3">{helper}</p>
          )}
          {children}
        </div>
      );
    }

    // ---------------- Display row (read-only inside cards) ----------------
    function Row({ label, value, isChips }) {
      const chips = isChips ? String(value || "").split(",").map(s => s.trim()).filter(Boolean) : [];
      return (
        <div className="py-2.5 border-b border-stone-100 last:border-b-0">
          <div className="text-xs text-stone-500 mb-1">{label}</div>
          {isChips ? (
            chips.length > 0 ? (
              <div className="flex flex-wrap gap-1.5">
                {chips.map((chip, i) => (
                  <span key={i} className="inline-block px-2.5 py-1 bg-stone-100 text-stone-700 text-xs rounded-full">
                    {chip}
                  </span>
                ))}
              </div>
            ) : (
              <div className="text-stone-300">—</div>
            )
          ) : (
            <div className="text-stone-900 break-words">
              {value || <span className="text-stone-300">—</span>}
            </div>
          )}
        </div>
      );
    }

    // ---------------- Profile completeness ----------------
    const COMPLETENESS_FIELDS = [
      "my-photo-1", "my-photo-2", "my-photo-3",
      "name", "my-age", "my-occupation",
      "my-bio", "my-activities", "my-hobby",
      "sex", "my-height", "my-uni", "instagram",
      "my-MBTI", "my-love-language",
      "my-drinking-habbit", "my-smoking-habbit",
      "my-kids-expectation", "my-religion",
      "email", "phone"
    ];

    function calculateCompleteness(profile) {
      const filled = COMPLETENESS_FIELDS.filter(key => {
        const val = profile[key];
        return val !== undefined && val !== null && String(val).trim() !== "";
      }).length;
      const total = COMPLETENESS_FIELDS.length;
      const missing = total - filled;
      const percent = Math.round((filled / total) * 100);
      return { filled, total, missing, percent };
    }

    // ---------------- Who I Am ----------------
    function WhoIAm({ profile }) {
      const [editingCard, setEditingCard] = useState(null);

      const photos = [
        profile["my-photo-1"],
        profile["my-photo-2"],
        profile["my-photo-3"]
      ];

      const { missing, percent } = calculateCompleteness(profile);

      // Field configs for each card's bottom sheet
      const cardConfigs = {
        summary: {
          title: "編輯個人簡介",
          fields: [
            { key: "my-photo-1", label: "相片 1 (URL)" },
            { key: "my-photo-2", label: "相片 2 (URL)" },
            { key: "my-photo-3", label: "相片 3 (URL)" },
            { key: "name", label: "姓名" },
            { key: "my-age", label: "出生日期" },
            { key: "my-occupation", label: "職業" },
          ]
        },
        about: {
          title: "編輯 ✨ 讓人更了解你",
          fields: [
            { key: "my-bio", label: "自我介紹", type: "textarea" },
            { key: "my-activities", label: "想一齊做嘅活動 (用逗號分隔)" },
            { key: "my-hobby", label: "興趣 (用逗號分隔)" },
          ]
        },
        basic: {
          title: "編輯 📌 基本資料",
          fields: [
            { key: "sex", label: "性別" },
            { key: "my-height", label: "身高 (cm)" },
            { key: "my-uni", label: "大學" },
            { key: "instagram", label: "Instagram" },
          ]
        },
        personality: {
          title: "編輯 🧠 個性 & 相處",
          fields: [
            { key: "my-MBTI", label: "MBTI" },
            { key: "my-love-language", label: "愛的語言" },
          ]
        },
        lifestyle: {
          title: "編輯 🌿 生活習慣",
          fields: [
            { key: "my-drinking-habbit", label: "飲酒習慣" },
            { key: "my-smoking-habbit", label: "吸煙習慣" },
          ]
        },
        relationship: {
          title: "編輯 💛 關係觀",
          fields: [
            { key: "my-kids-expectation", label: "對小朋友的想法" },
            { key: "my-religion", label: "宗教" },
          ]
        },
        account: {
          title: "編輯 ⚙️ 帳戶設定",
          fields: [
            { key: "email", label: "電郵", readOnly: true },
            { key: "phone", label: "電話" },
          ]
        },
      };

      const openSheet = (cardKey) => setEditingCard(cardKey);
      const closeSheet = () => setEditingCard(null);

      return (
        <div className="fade-in">
          {/* ---------- Card 1: Summary ---------- */}
          <Card onEdit={() => openSheet("summary")}>
            {/* Photos: 1 large + 2 stacked */}
            <div className="grid grid-cols-3 grid-rows-2 gap-2 mb-4" style={{ aspectRatio: "3/2" }}>
              <div className="col-span-2 row-span-2 bg-stone-100 rounded-lg overflow-hidden">
                {photos[0] ? (
                  <img src={photos[0]} alt="photo-1" className="w-full h-full object-cover" />
                ) : (
                  <div className="w-full h-full flex items-center justify-center text-stone-300 text-xs">無相片</div>
                )}
              </div>
              <div className="bg-stone-100 rounded-lg overflow-hidden">
                {photos[1] ? (
                  <img src={photos[1]} alt="photo-2" className="w-full h-full object-cover" />
                ) : (
                  <div className="w-full h-full flex items-center justify-center text-stone-300 text-xs">無相片</div>
                )}
              </div>
              <div className="bg-stone-100 rounded-lg overflow-hidden">
                {photos[2] ? (
                  <img src={photos[2]} alt="photo-3" className="w-full h-full object-cover" />
                ) : (
                  <div className="w-full h-full flex items-center justify-center text-stone-300 text-xs">無相片</div>
                )}
              </div>
            </div>

            {/* Name + key info */}
            <div className="mb-4">
              <h2 className="text-xl font-semibold text-stone-900 mb-1">
                {profile.name || <span className="text-stone-300">未填寫</span>}
              </h2>
              <div className="text-sm text-stone-600 space-y-0.5">
                {profile["my-age"] && <div>🎂 {profile["my-age"]}</div>}
                {profile["my-occupation"] && <div>💼 {profile["my-occupation"]}</div>}
              </div>
            </div>

            {/* Completeness */}
            <div className="bg-stone-50 rounded-lg p-3">
              <div className="flex items-center justify-between mb-2">
                <span className="text-xs font-medium text-stone-700">個人檔案完成度</span>
                <span className="text-sm font-semibold text-stone-900">{percent}%</span>
              </div>
              <div className="h-2 bg-stone-200 rounded-full overflow-hidden mb-2">
                <div
                  className="h-full bg-gradient-to-r from-yellow-300 to-yellow-500 transition-all"
                  style={{ width: `${percent}%` }}
                />
              </div>
              {missing > 0 ? (
                <p className="text-xs text-stone-500">
                  再填 <span className="font-semibold text-stone-900">{missing}</span> 項提升配對機會
                </p>
              ) : (
                <p className="text-xs text-green-600">✨ 完美!你嘅檔案已經填齊曬</p>
              )}
            </div>
          </Card>

          {/* ---------- Card 2: About ---------- */}
          <Card
            icon="✨"
            title="讓人更了解你"
            helper="填得越多,我哋越容易幫你搵到適合的人"
            onEdit={() => openSheet("about")}
          >
            <Row label="自我介紹" value={profile["my-bio"]} />
            <Row label="想一齊做嘅活動" value={profile["my-activities"]} isChips />
            <Row label="興趣" value={profile["my-hobby"]} isChips />
          </Card>

          {/* ---------- Card 3: Basic ---------- */}
          <Card icon="📌" title="基本資料" onEdit={() => openSheet("basic")}>
            <Row label="性別" value={profile.sex} />
            <Row label="身高 (cm)" value={profile["my-height"]} />
            <Row label="大學" value={profile["my-uni"]} />
            <Row label="Instagram" value={profile.instagram} />
          </Card>

          {/* ---------- Card 4: Personality ---------- */}
          <Card icon="🧠" title="個性 & 相處" onEdit={() => openSheet("personality")}>
            <Row label="MBTI" value={profile["my-MBTI"]} />
            <Row label="愛的語言" value={profile["my-love-language"]} />
          </Card>

          {/* ---------- Card 5: Lifestyle ---------- */}
          <Card icon="🌿" title="生活習慣" onEdit={() => openSheet("lifestyle")}>
            <Row label="飲酒習慣" value={profile["my-drinking-habbit"]} />
            <Row label="吸煙習慣" value={profile["my-smoking-habbit"]} />
          </Card>

          {/* ---------- Card 6: Relationship ---------- */}
          <Card icon="💛" title="關係觀" onEdit={() => openSheet("relationship")}>
            <Row label="對小朋友的想法" value={profile["my-kids-expectation"]} />
            <Row label="宗教" value={profile["my-religion"]} />
          </Card>

          {/* ---------- Card 7: Account ---------- */}
          <Card icon="⚙️" title="帳戶設定" onEdit={() => openSheet("account")}>
            <Row label="電郵" value={profile.email} />
            <Row label="電話" value={profile.phone} />
          </Card>

          {/* ---------- Bottom sheet ---------- */}
          {editingCard && (
            <BottomSheet
              open={true}
              title={cardConfigs[editingCard].title}
              fields={cardConfigs[editingCard].fields}
              profile={profile}
              onClose={closeSheet}
            />
          )}
        </div>
      );
    }

    // ---------------- What I Want ----------------
    function WhatIWant({ profile, dealBreakers }) {
      return (
        <div className="bg-white rounded-xl border border-stone-200 p-5 fade-in">
          <WantField label="年齡範圍" fieldKey="age" dealBreakers={dealBreakers}>
            <RangeDisplay
              min={profile["their-age-min"]}
              max={profile["their-age-max"]}
              unit="歲"
            />
          </WantField>

          <WantField label="身高範圍" fieldKey="height" dealBreakers={dealBreakers}>
            <RangeDisplay
              min={profile["their-height-min"]}
              max={profile["their-height-max"]}
              unit="cm"
            />
          </WantField>

          <WantField label="職業" value={profile["their-occupation"]} fieldKey="occupation" dealBreakers={dealBreakers} />
          <WantField label="大學" value={profile["their-uni"]} fieldKey="uni" dealBreakers={dealBreakers} />
          <WantField label="MBTI" value={profile["their-MBTI"]} fieldKey="MBTI" dealBreakers={dealBreakers} />
          <WantField label="愛的語言" value={profile["their-love-language"]} fieldKey="love-language" dealBreakers={dealBreakers} />
          <WantField label="對小朋友的想法" value={profile["their-kids-preferences"]} fieldKey="kids-preferences" dealBreakers={dealBreakers} />
          <WantField label="飲酒習慣" value={profile["their-drinking-habbit"]} fieldKey="drinking-habbit" dealBreakers={dealBreakers} />
          <WantField label="吸煙習慣" value={profile["their-smoking-habbit"]} fieldKey="smoking-habbit" dealBreakers={dealBreakers} />
          <WantField label="宗教" value={profile["their-religion"]} fieldKey="religion" dealBreakers={dealBreakers} />
          <WantField label="其他要求" value={profile["extra-requirements"]} fieldKey="extra-requirements" dealBreakers={dealBreakers} hideToggle />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
  </script>
</body>
</html>
