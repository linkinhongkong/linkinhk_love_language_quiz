<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>會員專區 · Link in HK</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Microsoft JhengHei", sans-serif;
      background-color: #fafaf9;
      padding-bottom: 80px;
    }
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .spin {
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .range-track {
      background: linear-gradient(to right, #fef3c7, #fbbf24, #fef3c7);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Order matters: lib → form-options → components → tabs → app -->
  <script type="text/babel" src="/dashboard/lib.js"></script>
  <script type="text/babel" src="/dashboard/shared-options.js"></script>
  <script type="text/babel" src="/dashboard/form-options.js"></script>
  <script type="text/babel" src="/dashboard/components.js"></script>
  <script type="text/babel" src="/dashboard/tab-match.js"></script>
  <script type="text/babel" src="/dashboard/tab-events.js"></script>
  <script type="text/babel" src="/dashboard/tab-history.js"></script>
  <script type="text/babel" src="/dashboard/tab-profile-cards.js"></script>
  <script type="text/babel" src="/dashboard/tab-want-cards.js"></script>
  <script type="text/babel" src="/dashboard/tab-profile.js"></script>
  <script type="text/babel" src="/dashboard/app.js"></script>
</body>
</html>
