<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Link in HK">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FF6EB4"/>
      <stop offset="1" stop-color="#A259FF"/>
    </linearGradient>
    <style>
      /* Light mode: solid gradient tile with a white heart */
      .tile   { fill: url(#brand); }
      .ring   { fill: none; stroke: none; }
      .heart  { fill: #ffffff; }
      /* Dark mode: transparent tile, gradient heart with a gradient ring */
      @media (prefers-color-scheme: dark) {
        .tile  { fill: none; }
        .ring  { fill: none; stroke: url(#brand); stroke-width: 5; }
        .heart { fill: url(#brand); }
      }
    </style>
  </defs>
  <rect class="tile" x="2" y="2" width="96" height="96" rx="24"/>
  <rect class="ring" x="4.5" y="4.5" width="91" height="91" rx="22"/>
  <path class="heart" d="M50 83 C 18 61 14 35 33 27 C 43 23 50 30 50 39 C 50 30 57 23 67 27 C 86 35 82 61 50 83 Z"/>
</svg>
