  <script type="text/babel">
    const { useState, useRef } = React;

/* ═══════════════════════════════════════════
   CONFIG
   ═══════════════════════════════════════════ */
const WEBHOOK_URL = "https://linkinhk.app.n8n.cloud/webhook/find";
const NEXT_PAGE_URL = "/potential-match";
const LOGO_URL = "/logo.png";
const STORAGE_KEY = "linkin_part1_data";

/* ═══════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════ */
const PRIORITY_ITEMS = [
  { id: "looks", icon: "✨", label: "外在條件", desc: "長相、身高、穿著打扮" },
  { id: "personality", icon: "💜", label: "性格", desc: "溫柔、體貼、包容、幽默" },
  { id: "values", icon: "🌱", label: "價值觀", desc: "未來規劃、對金錢嘅看法" },
];

const STEPS = [
  { title: "你想搵⋯⋯", subtitle: "讓我哋了解你嘅理想對象 ✨" },
  { title: "年齡同身高", subtitle: "你心目中嘅範圍 📏" },
  { title: "你最重視乜嘢？", subtitle: "拖動排序，最重要嘅放最上面 💫" },
  { title: "仲有冇其他想講？", subtitle: "用文字話我哋聽，越具體越好 💬" },
];

/* ═══════════════════════════════════════════
   COMPONENT
   ═══════════════════════════════════════════ */
function FindForm() {
  const [step, setStep] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const [errors, setErrors] = useState({});
  const cardRef = useRef(null);

  // Try to load existing data from localStorage on mount
  const loadSaved = () => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
    } catch (e) {}
    return null;
  };
  const savedData = loadSaved();

  const [form, setForm] = useState(savedData || {
    targetGender: "",
    ageMin: 18, ageMax: 60,
    heightMin: 140, heightMax: 200,
    priorityOrder: ["looks", "personality", "values"],
    freeText: "",
  });

  // edit states for range inputs
  const [editAgeMin, setEditAgeMin] = useState(null);
  const [editAgeMax, setEditAgeMax] = useState(null);
  const [editHeightMin, setEditHeightMin] = useState(null);
  const [editHeightMax, setEditHeightMax] = useState(null);

  const set = (key, val) => {
    setForm(prev => ({ ...prev, [key]: val }));
    setErrors(prev => ({ ...prev, [key]: undefined }));
  };

  const toggleArray = (key, val, max) => {
    setForm(prev => {
      const arr = prev[key];
      if (arr.includes(val)) return { ...prev, [key]: arr.filter(v => v !== val) };
      if (max && arr.length >= max) return prev;
      return { ...prev, [key]: [...arr, val] };
    });
    setErrors(prev => ({ ...prev, [key]: undefined }));
  };

  const validateStep = () => {
    const e = {};
    if (step === 0) {
      if (!form.targetGender) e.targetGender = "請揀一個";
    } else if (step === 1) {
      if (!form.ageMin || !form.ageMax) e.age = "請輸入年齡範圍";
      else if (form.ageMin >= form.ageMax) e.age = "最低年齡要細過最高年齡";
      if (!form.heightMin || !form.heightMax) e.height = "請輸入身高範圍";
      else if (form.heightMin >= form.heightMax) e.height = "最低身高要細過最高身高";
    }
    // Step 2 (priority ranking) — always valid (default order is set)
    // Step 3 (free text) — optional, no validation
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const scrollToTop = () => window.scrollTo({ top: 0, behavior: "smooth" });

  const next = () => {
    if (!validateStep()) return;
    if (step < STEPS.length - 1) {
      setStep(s => s + 1);
      scrollToTop();
    }
  };
  const prev = () => {
    if (step > 0) { setStep(s => s - 1); scrollToTop(); }
  };

  const submit = async () => {
    if (!validateStep()) return;
    setSubmitting(true);
    try {
      // Save to localStorage immediately so Part 3 can pick it up later
      localStorage.setItem(STORAGE_KEY, JSON.stringify(form));

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 30000);

      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(form),
        signal: controller.signal,
      });
      clearTimeout(timeout);

      if (res.ok) {
        const matches = await res.json().catch(() => ({ matches: [] }));
        // Save matches to localStorage so Part 2 can read them
        localStorage.setItem("linkin_part2_matches", JSON.stringify(matches));
        window.location.href = NEXT_PAGE_URL;
      } else {
        alert("提交失敗，請稍後再試 🙏");
      }
    } catch (err) {
      console.error("Submit error:", err);
      if (err.name === "AbortError") {
        alert("提交超時，請檢查網絡後再試 🙏");
      } else {
        alert("提交失敗，請檢查網絡後再試 🙏");
      }
    } finally {
      setSubmitting(false);
    }
  };

  const ErrorMsg = ({ field }) => errors[field] ? <div className="field-error">{errors[field]}</div> : null;

  /* ── Step renderers ── */

  const renderStep0 = () => (
    <div className="step-content">
      <div className="field">
        <div className="field-label">你想搵⋯⋯</div>
        <div className="binary-row">
          <div className={`binary-btn ${form.targetGender === "F" ? "active" : ""}`} onClick={() => set("targetGender", "F")}>
            <span className="binary-icon">👩</span>
            女生
          </div>
          <div className={`binary-btn ${form.targetGender === "M" ? "active" : ""}`} onClick={() => set("targetGender", "M")}>
            <span className="binary-icon">👨</span>
            男生
          </div>
        </div>
        <ErrorMsg field="targetGender" />
      </div>
    </div>
  );

  const renderStep1 = () => (
    <div className="step-content">
      <div className="field">
        <div className="field-label">年齡範圍</div>
        <div className="range-inputs">
          <div className="range-input-group">
            <div className="range-input-label">最低</div>
            <div className="range-input-box">
              <input
                type="text" inputMode="numeric" className="range-input"
                value={editAgeMin !== null ? editAgeMin : form.ageMin}
                onFocus={e => { setEditAgeMin(String(form.ageMin)); e.target.select(); }}
                onChange={e => setEditAgeMin(e.target.value)}
                onBlur={() => {
                  const n = parseInt(editAgeMin);
                  if (!isNaN(n) && n > 0) set("ageMin", n);
                  setEditAgeMin(null);
                }}
              />
              <span className="range-input-unit">歲</span>
            </div>
          </div>
          <div className="range-input-dash">—</div>
          <div className="range-input-group">
            <div className="range-input-label">最高</div>
            <div className="range-input-box">
              <input
                type="text" inputMode="numeric" className="range-input"
                value={editAgeMax !== null ? editAgeMax : form.ageMax}
                onFocus={e => { setEditAgeMax(String(form.ageMax)); e.target.select(); }}
                onChange={e => setEditAgeMax(e.target.value)}
                onBlur={() => {
                  const n = parseInt(editAgeMax);
                  if (!isNaN(n) && n > 0) set("ageMax", n);
                  setEditAgeMax(null);
                }}
              />
              <span className="range-input-unit">歲</span>
            </div>
          </div>
        </div>
        <ErrorMsg field="age" />
      </div>

      <div className="field">
        <div className="field-label">身高範圍</div>
        <div className="range-inputs">
          <div className="range-input-group">
            <div className="range-input-label">最低</div>
            <div className="range-input-box">
              <input
                type="text" inputMode="numeric" className="range-input"
                value={editHeightMin !== null ? editHeightMin : form.heightMin}
                onFocus={e => { setEditHeightMin(String(form.heightMin)); e.target.select(); }}
                onChange={e => setEditHeightMin(e.target.value)}
                onBlur={() => {
                  const n = parseInt(editHeightMin);
                  if (!isNaN(n) && n > 0) set("heightMin", n);
                  setEditHeightMin(null);
                }}
              />
              <span className="range-input-unit">cm</span>
            </div>
          </div>
          <div className="range-input-dash">—</div>
          <div className="range-input-group">
            <div className="range-input-label">最高</div>
            <div className="range-input-box">
              <input
                type="text" inputMode="numeric" className="range-input"
                value={editHeightMax !== null ? editHeightMax : form.heightMax}
                onFocus={e => { setEditHeightMax(String(form.heightMax)); e.target.select(); }}
                onChange={e => setEditHeightMax(e.target.value)}
                onBlur={() => {
                  const n = parseInt(editHeightMax);
                  if (!isNaN(n) && n > 0) set("heightMax", n);
                  setEditHeightMax(null);
                }}
              />
              <span className="range-input-unit">cm</span>
            </div>
          </div>
        </div>
        <ErrorMsg field="height" />
      </div>
    </div>
  );

  const movePriority = (idx, dir) => {
    setForm(prev => {
      const arr = [...prev.priorityOrder];
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= arr.length) return prev;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return { ...prev, priorityOrder: arr };
    });
  };

  const renderStep2 = () => (
    <div className="step-content">
      <div className="field">
        <div className="field-label">你最重視乜嘢？</div>
        <div className="field-hint">用箭頭調整順序，最重要嘅放最上面</div>
        <div className="rank-list">
          {form.priorityOrder.map((id, idx) => {
            const item = PRIORITY_ITEMS.find(p => p.id === id);
            return (
              <div className="rank-item" key={id}>
                <div className="rank-num">{idx + 1}</div>
                <div className="rank-icon">{item.icon}</div>
                <div className="rank-content">
                  <div className="rank-label">{item.label}</div>
                  <div className="rank-desc">{item.desc}</div>
                </div>
                <div className="rank-arrows">
                  <button className="rank-arrow" disabled={idx === 0} onClick={() => movePriority(idx, -1)}>▲</button>
                  <button className="rank-arrow" disabled={idx === form.priorityOrder.length - 1} onClick={() => movePriority(idx, 1)}>▼</button>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );

  const renderStep3 = () => (
    <div className="step-content">
      <div className="field">
        <div className="field-label">用文字話我哋聽你想搵咩樣嘅人（可選填）</div>
        <div className="field-hint">越具體越好，例如：希望對方鍾意行山、顧家、唔食煙</div>
        <textarea
          className="text-input"
          placeholder="寫低你心目中嘅理想對象⋯⋯"
          value={form.freeText}
          onChange={e => set("freeText", e.target.value)}
          maxLength={300}
        />
        <div style={{ textAlign: "right", fontSize: 12, color: "#bbb", marginTop: 4 }}>{form.freeText.length} / 300</div>
      </div>
    </div>
  );

  const stepRenderers = [renderStep0, renderStep1, renderStep2, renderStep3];

  return (
    <>
      <style>{STYLES}</style>
      <div className="form-root">
        <div className="form-card" ref={cardRef}>
          {submitting && (
            <div className="submitting-overlay">
              <div className="spinner" />
              <div className="loading-title">請等等！我哋搵緊適合你嘅人 ✨</div>
              <div className="loading-hint">通常需要 10 秒左右，請稍等 🙏</div>
            </div>
          )}

          <div className="form-header">
            <img src={LOGO_URL} alt="Link.in" className="logo-img" />
            <div className="step-indicator">{step + 1} / {STEPS.length}</div>
          </div>

          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${((step + 1) / STEPS.length) * 100}%` }} />
          </div>

          <div className="step-header">
            <div className="step-title">{STEPS[step].title}</div>
            <div className="step-subtitle">{STEPS[step].subtitle}</div>
          </div>

          <div className="step-body">
            {stepRenderers[step]()}
          </div>

          <div className="nav-row">
            {step > 0 && <button className="nav-btn secondary" onClick={prev}>返回</button>}
            {step < STEPS.length - 1 ? (
              <button className="nav-btn primary" onClick={next}>繼續</button>
            ) : (
              <button className="nav-btn primary" onClick={submit} disabled={submitting}>
                {submitting ? "搵緊⋯⋯" : "幫我配對 ✨"}
              </button>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<FindForm />);
  </script>
</body>
</html>
