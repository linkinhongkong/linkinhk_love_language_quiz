    width: 100%;
    max-width: 480px;
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    position: relative;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent-gradient);
    z-index: 1;
  }

  /* ── Header ── */
  .form-header {
    padding: 28px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;

  .logo-img { height: 20px; opacity: 0.8; }

    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    letter-spacing: 0.5px;
  }

  /* ── Progress bar ── */
  .progress-bar {
    margin: 16px 24px 0;
    height: 4px;
    background: var(--chip-bg);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent-gradient);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── Step header ── */
  .step-header { padding: 24px 24px 4px; }
  .step-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .step-subtitle { font-size: 14px; color: var(--text-light); }
  .step-body { padding: 16px 24px 24px; }

  /* ── Fields ── */

  .text-input {

  .dob-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .radio-option {
    padding: 13px 16px;

    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover { border-color: var(--accent); background: #faf7ff; }
  .upload-zone.has-image { border-style: solid; border-color: var(--accent); padding: 0; }
  .upload-zone .upload-icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone .upload-text { font-size: 14px; color: var(--text-light); }
  .upload-zone .upload-hint { font-size: 12px; color: #bbb; margin-top: 4px; }
  .upload-preview { width: 100%; max-height: 300px; object-fit: cover; display: block; }
  .upload-remove {
    position: absolute;
    top: 8px; right: 8px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .upload-input { display: none; }

  /* ── Consent ── */
  .consent-box {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 16px;
    border: 2px solid #e8e8e8;
    margin-bottom: 16px;
    max-height: 240px;
    overflow-y: auto;
  }
  .consent-title { font-size: 14px; font-weight: 700; margin-bottom: 12px; }
  .consent-body { font-size: 12px; color: #666; line-height: 1.7; }
  .consent-body b { color: #444; }
  .consent-check {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-radius: var(--radius-sm);
    border: 2px solid #e8e8e8;
    background: var(--white);
    cursor: pointer;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .consent-check.active { border-color: var(--accent); background: #f0e8fc; }
  .consent-checkbox {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    font-size: 14px;
    color: white;
    font-weight: 700;
  }
  .consent-check.active .consent-checkbox {
    background: var(--accent);
    border-color: var(--accent);
  }
  .consent-label { font-size: 14px; font-weight: 600; }

  /* ── Navigation ── */
  .nav-row { padding: 8px 24px 28px; display: flex; gap: 10px; }
  .nav-btn {
    flex: 1;
    padding: 14px;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-btn.secondary { background: var(--chip-bg); color: #666; }
  .nav-btn.secondary:hover { background: #e0e0e0; }
  .nav-btn.primary {
    background: var(--accent-gradient);
    color: white;
    box-shadow: 0 4px 16px rgba(144, 96, 224, 0.3);
  }
  .nav-btn.primary:hover {
    box-shadow: 0 6px 20px rgba(144, 96, 224, 0.4);
    transform: translateY(-1px);
  }
  .nav-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  /* ── Range bar (visual only) + inputs ── */
  .range-slider {
    width: 100%;
    height: 6px;
    position: relative;
    margin: 8px 0 12px;
    border-radius: 3px;
  }
  .range-slider-track {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
  }
  .range-slider-fill {
    position: absolute;
    top: 0;
    height: 6px;
    background: var(--accent-gradient);
    border-radius: 3px;
    transition: left 0.3s, width 0.3s;
  }
  .range-inputs {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 8px;
  }
  .range-input-group { flex: 1; }
  .range-input-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-light);
    margin-bottom: 4px;
  }
  .range-input-box {
    display: flex;
    align-items: center;
    border: 2px solid #e0e0e0;
    border-radius: var(--radius-sm);
    background: var(--white);
    padding: 8px 12px;
    transition: border-color 0.2s;
  }
  .range-input-box:focus-within { border-color: var(--accent); }
  .range-input {
    border: none;
    outline: none;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text);
    width: 100%;
    background: transparent;
    -webkit-appearance: none;
  }
  .range-input-unit {
    font-size: 13px;
    color: var(--text-light);
    margin-left: 4px;
    flex-shrink: 0;
  }
  .range-input-dash {
    color: #ccc;
    font-size: 14px;
    margin-top: 18px;
    flex-shrink: 0;
  }

  /* ── Callout ── */
  .callout-yellow {
    background: var(--yellow-bg);
    border-left: 4px solid var(--yellow-border);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #666;
  }

  /* ── Error ── */
  .field-error { font-size: 12px; color: #e53e3e; margin-top: 6px; }

  /* ── Divider ── */
  .section-divider { height: 1px; background: #e8e8e8; margin: 4px 0 22px; }

  /* ── Transitions ── */
  .step-content { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Submitting overlay ── */
  .submitting-overlay {
    position: absolute;
    inset: 0;
    background: rgba(247,247,247,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    border-radius: var(--radius);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--chip-bg);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Success ── */
  .success-screen { padding: 60px 24px; text-align: center; }
  .success-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--green-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
  }
  .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-subtitle { font-size: 14px; color: var(--text-light); line-height: 1.7; }
  .success-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
    padding: 14px 28px;
    border-radius: var(--radius-sm);
    background: var(--accent-gradient);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 4px 16px rgba(144, 96, 224, 0.3);
    transition: all 0.2s;
  }
  .success-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(144, 96, 224, 0.4); }

  /* ── Mobile tweaks ── */
  @media (max-width: 500px) {
    .form-root { padding: 12px 8px 40px; }
    .form-card { border-radius: 16px; }
    .step-body { padding: 16px 20px 20px; }
    .nav-row { padding: 8px 20px 24px; }
    .form-header { padding: 24px 20px 0; }
    .progress-bar { margin: 14px 20px 0; }
    .step-header { padding: 20px 20px 4px; }
    .step-title { font-size: 20px; }
  }
`;


/* ═══════════════════════════════════════════
   COMPONENT
   ═══════════════════════════════════════════ */
function LinkInSignup() {
  const [step, setStep] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});
  const fileInputRef = useRef(null);
  const cardRef = useRef(null);

  const [form, setForm] = useState({
    // Step 0 — basics
    name: "", gender: "", birthDay: "", birthMonth: "", birthYear: "", email: "", whatsapp: "", instagram: "",
    // Step 1 — about you
    occupation: "", height: "", university: "",
    // Step 2 — personality
    trait_thinking: "", trait_expression: "", trait_planning: "",
    mbti: "", knowLoveLang: "", loveLangRank: LOVE_LANGUAGES.map(l => l.id),
    // Step 3 — lifestyle
    interests: [], drinking: "", smoking: "", meetingFreq: "",
    relGoals: [], kidsPref: "",
    // Step 4 — display
    photo: null, photoPreview: null, selfIntro: "",
    // Step 5 — pref basics
    prefAgeMin: 18, prefAgeMax: 60, prefHeightMin: 140, prefHeightMax: 200, prefOccupation: [], prefUniversity: [],
    // Step 6 — pref personality
    prefMbti: [], prefLoveLang: [],
    prefThinking: "", prefExpression: "", prefPlanning: "",
    prefDrinking: [], prefSmoking: [],
    // Step 7 — final
    extraRequirements: "", referral: [], igUnderstand: false, consent: false,
  });

  /* ── State helpers ── */
  const set = useCallback((key, val) => {
    setForm(prev => ({ ...prev, [key]: val }));
    setErrors(prev => ({ ...prev, [key]: undefined }));
  }, []);

  const toggleMulti = useCallback((key, val, max) => {
    setForm(prev => {
      const arr = prev[key];
      if (arr.includes(val)) return { ...prev, [key]: arr.filter(v => v !== val) };
      if (max && arr.length >= max) return prev;
      return { ...prev, [key]: [...arr, val] };
    });
    setErrors(prev => ({ ...prev, [key]: undefined }));
  }, []);

  const toggleMultiWithNone = useCallback((key, val, noneVal = "無所謂") => {
    setForm(prev => {
      const arr = prev[key];
      if (val === noneVal) return { ...prev, [key]: [noneVal] };
      const without = arr.filter(v => v !== noneVal);
      if (without.includes(val)) return { ...prev, [key]: without.filter(v => v !== val) };
      return { ...prev, [key]: [...without, val] };
    });
  }, []);

  const moveLang = useCallback((idx, dir) => {
    setForm(prev => {
      const arr = [...prev.loveLangRank];
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= arr.length) return prev;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return { ...prev, loveLangRank: arr };
    });
  }, []);

  const handlePhoto = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert("檔案太大，請上傳 10MB 以下嘅圖片 🙏");
      return;
    }
    set("photo", file);
    const reader = new FileReader();
    reader.onload = (ev) => set("photoPreview", ev.target.result);
    reader.readAsDataURL(file);
  };

  const removePhoto = (e) => {
    e.stopPropagation();
    set("photo", null);
    set("photoPreview", null);
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  /* ── Validation ── */
  const validateStep = () => {
    const e = {};
    if (step === 0) {
      if (!form.name.trim()) e.name = "請輸入名字";
      if (!form.gender) e.gender = "請選擇性別";
      if (!form.birthDay || !form.birthMonth || !form.birthYear) e.birthday = "請選擇完整生日";
      if (!form.email.trim()) e.email = "請輸入電郵地址";
      else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = "電郵格式唔正確";
      if (!form.whatsapp.trim()) e.whatsapp = "請輸入 WhatsApp 號碼";
      if (!form.instagram.trim()) e.instagram = "請輸入 Instagram 名稱";
    } else if (step === 1) {
      if (!form.occupation) e.occupation = "請選擇職業";
      if (!form.height.trim()) e.height = "請輸入身高";
      else if (isNaN(Number(form.height)) || Number(form.height) < 100 || Number(form.height) > 250) e.height = "請輸入合理身高（100-250cm）";
      if (!form.university) e.university = "請選擇大學";
    } else if (step === 2) {
      if (!form.trait_thinking) e.trait_thinking = "請選擇";
      if (!form.trait_expression) e.trait_expression = "請選擇";
      if (!form.trait_planning) e.trait_planning = "請選擇";
      if (!form.mbti) e.mbti = "請選擇 MBTI";
      if (!form.knowLoveLang) e.knowLoveLang = "請選擇";
    } else if (step === 3) {
      if (form.interests.length < 3) e.interests = "請選擇至少 3 個興趣";
      if (form.interests.length > 6) e.interests = "最多選 6 個";
      if (!form.drinking) e.drinking = "請選擇飲酒習慣";
      if (!form.smoking) e.smoking = "請選擇吸煙習慣";
      if (!form.meetingFreq) e.meetingFreq = "請選擇見面頻率";
      if (form.relGoals.length === 0) e.relGoals = "請至少選擇一個";
      if (!form.kidsPref) e.kidsPref = "請選擇";
    } else if (step === 4) {
      if (!form.photo) e.photo = "請上傳一張照片";
    } else if (step === 5) {
      // Range sliders always have valid values, no validation needed
    } else if (step === 7) {
      if (form.referral.length === 0) e.referral = "請選擇至少一個";
      if (!form.igUnderstand) e.igUnderstand = "請確認你明白";
      if (!form.consent) e.consent = "請同意會員條款先繼續";
    }
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  /* ── Navigation ── */
  const scrollToTop = () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const next = () => {
    if (!validateStep()) return;
    if (step < STEPS.length - 1) {
      setStep(s => s + 1);
      scrollToTop();
    }
  };
  const prev = () => {
    if (step > 0) {
      setStep(s => s - 1);
      scrollToTop();
    }
  };

  /* ── Submit ── */
  const submit = async () => {
    if (!validateStep()) return;
    setSubmitting(true);
    try {
      /* ── Mapping helpers ── */
      const genderMap = { M: "男性", F: "女性" };

      const occMap = {};
      OCCUPATIONS.forEach(o => { occMap[o.id] = o.icon + o.label; });

      const uniMap = {};
      UNIVERSITIES.forEach(u => { uniMap[u.id] = u.label; });

      const attrThinkMap = { rational: "🧠 理性，實際", emotional: "💜 感性，重感覺" };
      const attrExprMap = { expressive: "🗣 主動表達", reserved: "🔇 慢熱內斂" };
      const attrPlanMap = { planner: "📋 有計劃", spontaneous: "🎲 彈性即興" };

      const mbtiEmojiMap = {
        INTJ:"🟣",INTP:"🟣",ENTJ:"🔴",ENTP:"🔴",
        INFJ:"🟢",INFP:"🟢",ENFJ:"🟢",ENFP:"🟢",
        ISTJ:"🔵",ISFJ:"🔵",ESTJ:"🔵",ESFJ:"🔵",
        ISTP:"🟡",ISFP:"🟡",ESTP:"🟡",ESFP:"🟡",
      };

      const loveLangMap = {
        words: "肯定的言語 (Words of Affirmation)",
        time: "精心時刻 (Quality Time)",
        gifts: "接受禮物 (Receiving Gifts)",
        service: "服務行動 (Acts of Service)",
        touch: "身體接觸 (Physical Touch)",
      };

      const interestMap = {};
      Object.values(INTERESTS).flat().forEach(i => { interestMap[i.id] = i.icon + i.label; });

      const drinkMap = {};
      DRINKING.forEach(d => { drinkMap[d.id] = d.label; });

      const smokeMap = {};
      SMOKING.forEach(s => { smokeMap[s.id] = s.label; });

      const freqMap = {};
      MEETING_FREQ.forEach(m => { freqMap[m.id] = m.label; });

      const relMap = {};
      REL_GOALS.forEach(r => { relMap[r.id] = r.label; });

      const kidsMap = {};
      KIDS_PREF.forEach(k => { kidsMap[k.id] = k.label; });

      const theirAge = form.prefAgeMin + "-" + form.prefAgeMax + " 歲";
      const theirHeight = form.prefHeightMin + "-" + form.prefHeightMax;

      /* ── Build payload ── */
      const birthday = form.birthYear + "-" + form.birthMonth.padStart(2,"0") + "-" + form.birthDay.padStart(2,"0");
      const cleanIG = form.instagram.trim().toLowerCase().replace(/^@/, "");

      const mbtiVal = form.mbti === "unsure" ? "不清楚" : (mbtiEmojiMap[form.mbti] || "") + form.mbti;

      const loveLangVal = form.knowLoveLang === "yes"
        ? form.loveLangRank.map(id => loveLangMap[id] || id).join(", ")
        : "";

      const prefMbtiVal = form.prefMbti.includes("無所謂") ? "無所謂"
        : form.prefMbti.map(t => (mbtiEmojiMap[t] || "") + t).join(", ");

      const prefLoveLangVal = form.prefLoveLang.length === 0 ? ""
        : form.prefLoveLang.map(id => loveLangMap[id] || id).join(", ");

      const prefOccVal = form.prefOccupation.includes("無所謂") ? "無所謂"
        : form.prefOccupation.map(id => occMap[id] || id).join(", ");

      const prefUniVal = form.prefUniversity.includes("無所謂") ? "無所謂"
        : form.prefUniversity.map(id => uniMap[id] || id).join(", ");

      const prefDrinkVal = form.prefDrinking.includes("無所謂") ? "無所謂"
        : form.prefDrinking.map(id => drinkMap[id] || id).join(", ");

      const prefSmokeVal = form.prefSmoking.includes("無所謂") ? "無所謂"
        : form.prefSmoking.map(id => smokeMap[id] || id).join(", ");

      const payload = new FormData();
      if (form.photo) payload.append("photo", form.photo, form.photo.name);

      // DB column name → display value
      payload.append("Submitted at", new Date().toISOString());
      payload.append("name", form.name);
      payload.append("sex", genderMap[form.gender] || form.gender);
      payload.append("my-age", birthday);
      payload.append("email", form.email);
      payload.append("phone", form.whatsapp);
      payload.append("instagram", cleanIG);
      payload.append("my-occupation", occMap[form.occupation] || form.occupation);
      payload.append("my-height", form.height);
      payload.append("my-uni", uniMap[form.university] || form.university);
      payload.append("my-attribute-1", attrThinkMap[form.trait_thinking] || "");
      payload.append("my-attribute-2", attrExprMap[form.trait_expression] || "");
      payload.append("my-attribute-3", attrPlanMap[form.trait_planning] || "");
      payload.append("my-MBTI", mbtiVal);
      payload.append("my-love-language", loveLangVal);
      payload.append("my-hobby", form.interests.map(id => interestMap[id] || id).join(", "));
      payload.append("my-drinking-habbit", drinkMap[form.drinking] || form.drinking);
      payload.append("my-smoking-habbit", smokeMap[form.smoking] || form.smoking);
      payload.append("my-hangout-frequent", freqMap[form.meetingFreq] || form.meetingFreq);
      payload.append("my-relationship-goal", form.relGoals.map(id => relMap[id] || id).join(", "));
      payload.append("my-kids-expectation", kidsMap[form.kidsPref] || form.kidsPref);
      payload.append("my-bio", form.selfIntro);
      payload.append("extra-requirements", form.extraRequirements);

      // Partner preferences
      payload.append("their-age", theirAge);
      payload.append("their-height", theirHeight);
      payload.append("their-occupation", prefOccVal);
      payload.append("their-uni", prefUniVal);
      payload.append("their-MBTI", prefMbtiVal);
      payload.append("their-love-language", prefLoveLangVal);
      payload.append("their-attribute-1", attrThinkMap[form.prefThinking] || "無所謂");
      payload.append("their-attribute-2", attrExprMap[form.prefExpression] || "無所謂");
      payload.append("their-attribute-3", attrPlanMap[form.prefPlanning] || "無所謂");
      // Copy own values as partner preference
      payload.append("their-meeting-frequency", freqMap[form.meetingFreq] || form.meetingFreq);
      payload.append("their-kids-preferences", kidsMap[form.kidsPref] || form.kidsPref);
      payload.append("their-drinking-habbit", prefDrinkVal);
      payload.append("their-smoking-habbit", prefSmokeVal);

      // Meta
      payload.append("touchpoint", JSON.stringify(form.referral));

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 15000);

      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        body: payload,
        signal: controller.signal,
      });
      clearTimeout(timeout);

      if (res.ok) {
        setSubmitted(true);
        scrollToTop();
      } else {
        alert("提交失敗，請稍後再試 🙏");
      }
    } catch (err) {
      console.error("Submit error:", err);
      if (err.name === "AbortError") {
        alert("提交超時，請檢查網絡後再試 🙏");
      } else {
        alert("提交失敗，請檢查網絡後再試 🙏");
      }
    } finally {
      setSubmitting(false);
    }
  };


  /* ═══════════════════════════════════════════
     RENDER HELPERS
     ═══════════════════════════════════════════ */
  const ErrorMsg = ({ field }) => errors[field] ? <div className="field-error">{errors[field]}</div> : null;

  const DualRange = ({ label, unit, min, max, valMin, valMax, onMinChange, onMaxChange }) => {
    const [editMin, setEditMin] = useState(null);
    const [editMax, setEditMax] = useState(null);

    const pctMin = ((valMin - min) / (max - min)) * 100;
    const pctMax = ((valMax - min) / (max - min)) * 100;

    return (
      <div className="field">
        <div className="field-label">{label}</div>
        <div className="range-slider">
          <div className="range-slider-track" />
          <div className="range-slider-fill" style={{ left: pctMin + "%", width: (pctMax - pctMin) + "%" }} />
        </div>
        <div className="range-inputs">
          <div className="range-input-group">
            <div className="range-input-label">最低</div>
            <div className="range-input-box">
              <input
                type="text"
                inputMode="numeric"
                className="range-input"
                value={editMin !== null ? editMin : valMin}
                onFocus={e => { setEditMin(String(valMin)); e.target.select(); }}

      </div>
      <div className="field">
        <div className="field-label">你希望對方的生活安排更傾向（可選填）</div>
        <div className="binary-row">
          <div className={`binary-btn ${form.prefPlanning === "有計劃" ? "active" : ""}`} onClick={() => set("prefPlanning", form.prefPlanning === "有計劃" ? "" : "有計劃")}>
            <span className="binary-icon">📋</span>有計劃
          </div>
          <div className={`binary-btn ${form.prefPlanning === "彈性即興" ? "active" : ""}`} onClick={() => set("prefPlanning", form.prefPlanning === "彈性即興" ? "" : "彈性即興")}>
            <span className="binary-icon">🎲</span>彈性即興
          </div>
        </div>
      </div>

      <div className="section-divider" />

      <div className="field">
        <div className="field-label">🍷 對方的飲酒習慣（可多選）</div>
        <div className="option-list">
          <CheckOptionNone stateKey="prefDrinking" val="無所謂" label="無所謂" />
          {DRINKING.map(d => <CheckOptionNone key={d.id} stateKey="prefDrinking" val={d.id} label={d.label} />)}
        </div>
      </div>
      <div className="field">
        <div className="field-label">🚬 對方的吸煙習慣（可多選）</div>
        <div className="option-list">
          <CheckOptionNone stateKey="prefSmoking" val="無所謂" label="無所謂" />
          {SMOKING.map(s => <CheckOptionNone key={s.id} stateKey="prefSmoking" val={s.id} label={s.label} />)}
        </div>
      </div>
    </div>
  );

  /* ── Step 7: 最後一步 ── */
  const renderStep7 = () => (
    <div className="step-content" key="s7">
      <div className="field">
        <div className="field-label">你對理想對象仲有冇其他要求？（可選填）</div>
        <div className="field-hint">例如：希望對方唔介意養寵物、對方有運動習慣等</div>
        <textarea
          className="text-input"
          placeholder="寫低你嘅額外要求⋯⋯"
          value={form.extraRequirements}
          onChange={e => set("extraRequirements", e.target.value)}
          maxLength={200}
        />
        <div style={{ textAlign: "right", fontSize: 12, color: "#bbb", marginTop: 4 }}>{form.extraRequirements.length} / 200</div>
      </div>

      <div className="section-divider" />

      <div className="field">
        <div className="field-label">你點樣知道 link.in.hk？ <span className="req">*</span></div>
        <div className="chip-grid">
          {REFERRAL_SOURCES.map(s => <MultiChip key={s} stateKey="referral" val={s} label={s} />)}
        </div>
        <ErrorMsg field="referral" />
      </div>

      <div className="section-divider" />

      <div className="callout-yellow">
        <b>📱 重要提醒</b><br /><br />
        我哋會透過 <b>Instagram DM</b> 發送每週配對結果。<br />
        如果你嘅 IG 設定唔允許陌生人 DM，我哋就無辦法聯絡你，你可能會錯過配對結果 🥲<br /><br />
        請確保你已經 <b>Follow @link.in.hk</b>，或者將 IG 私訊設定改為允許所有人傳送訊息。
      </div>

      <div className={`consent-check ${form.igUnderstand ? "active" : ""}`} onClick={() => set("igUnderstand", !form.igUnderstand)} style={{ marginBottom: 20 }}>
        <div className="consent-checkbox">{form.igUnderstand ? "✓" : ""}</div>
        <div className="consent-label">明白！</div>
      </div>
      <ErrorMsg field="igUnderstand" />

      <div className="section-divider" />

      <div className="consent-box">
        <div className="consent-title">會員同意及免責聲明</div>
        <div className="consent-body">
          在提交此表格前，請你確認並同意以下事項：
          <br /><br />
          <b>平台性質</b><br />
          為配對及社交活動平台，透過問卷資料及 AI／演算法分析，提供配對建議及活動邀請，所有結果僅供參考，並不保證任何配對或關係結果。
          <br /><br />
          <b>資料真實性</b><br />
          你確認所填寫的所有資料均為真實及準確。如資料不實，Link.in.HK 有權暫停或終止你的會員資格，而毋須作出補償。
          <br /><br />
          <b>AI 配對聲明</b><br />
          MBTI、星座、性格分類等僅屬參考分析工具，並非科學或專業建議。你明白配對結果可能與實際體驗有所差異。
          <br /><br />
          <b>會員互動及活動風險</b><br />
          你自願與其他會員聯絡、見面或參與活動，並需自行承擔相關風險。Link.in.HK 不會對會員之間的行為、糾紛、情感或任何損失承擔責任。
          <br /><br />
          <b>個人資料使用</b><br />
          你同意 Link.in.HK 使用你的資料作配對分析、活動通知及相關服務用途，並明白所有資料會按合理方式保密處理。
          <br /><br />
          <b>適用法律</b><br />
          本聲明受香港特別行政區法律管轄。
        </div>
      </div>

      <div className={`consent-check ${form.consent ? "active" : ""}`} onClick={() => set("consent", !form.consent)}>
        <div className="consent-checkbox">{form.consent ? "✓" : ""}</div>
        <div className="consent-label">我已閱讀並同意</div>
      </div>
      <ErrorMsg field="consent" />
    </div>
  );

  const stepRenderers = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7];


  /* ═══════════════════════════════════════════
     RENDER
     ═══════════════════════════════════════════ */

  if (submitted) {
    return (
      <>
        <style>{STYLES}</style>
        <div className="form-root">
          <div className="form-card">
            <div className="success-screen">
              <div className="success-icon">✅</div>
              <div className="success-title">登記完成喇！🎉</div>
              <div className="success-subtitle">
                多謝你嘅信任 🤍<br />
                接下來交俾我哋，我哋會認真了解你，<br />
                為你搵到最適合嘅人 💚
              </div>
              <a href="https://ig.me/m/link.in.hk" className="success-cta" target="_blank" rel="noopener noreferrer">
                Follow @link.in.hk 📱
              </a>
            </div>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <style>{STYLES}</style>
      <div className="form-root">
        <div className="form-card" ref={cardRef}>
          {submitting && (
            <div className="submitting-overlay">
              <div className="spinner" />
              <div style={{ fontSize: 15, color: "#666", fontWeight: 600 }}>提交緊⋯⋯</div>
              <div style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>通常需要約 10 秒，請稍等 🙏</div>
            </div>
          )}

          <div className="form-header">
            <img src={LOGO_URL} alt="Link.in" className="logo-img" />
            <div className="step-indicator">{step + 1} / {STEPS.length}</div>
          </div>

          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${((step + 1) / STEPS.length) * 100}%` }} />
          </div>

          <div className="step-header">
            <div className="step-title">{STEPS[step].title}</div>
            <div className="step-subtitle">{STEPS[step].subtitle}</div>
          </div>

          <div className="step-body">
            {stepRenderers[step]()}
          </div>

          <div className="nav-row">
            {step > 0 && <button className="nav-btn secondary" onClick={prev}>返回</button>}
            {step < STEPS.length - 1 ? (
              <button className="nav-btn primary" onClick={next}>繼續</button>
            ) : (
              <button className="nav-btn primary" onClick={submit} disabled={submitting}>
                {submitting ? "提交緊⋯⋯" : "提交 🎉"}
              </button>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<LinkInSignup />);
  </script>
</body>
</html>
