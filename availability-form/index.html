<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Link in HK — 填寫可見面時段</title>
  <meta name="description" content="告訴我哋你幾時方便見面,等我哋安排一個雙方都啱嘅時間">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    /* Page-specific: availability grid only. All other styling comes from /shared/design-system.css */

    /* Make form-card non-clipping so the page (not the card) is the
       scroll container for the sticky step-2 header. Round the decorative
       top bar to compensate for the dropped overflow clip. */
    .form-card { overflow: visible; }
    .form-card::before {
      border-top-left-radius: var(--radius);
      border-top-right-radius: var(--radius);
    }
    @media (max-width: 500px) {
      .form-card::before {
        border-top-left-radius: 16px;
        border-top-right-radius: 16px;
      }
    }

    .avail-intro {
      background: var(--yellow-bg);
      border-left: 4px solid var(--yellow-border);
      padding: 12px 14px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.65;
      color: var(--text-hint);
      margin-bottom: 20px;
    }

    .avail-table {
      width: 100%;
    }
    .avail-thead,
    .avail-tbody {
      display: grid;
      grid-template-columns: minmax(60px, 88px) repeat(4, 1fr);
      gap: 4px;
    }
    .avail-thead {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--card);
      padding-bottom: 4px;
    }
    .avail-head-cell,
    .avail-date-cell,
    .avail-slot-cell {
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .avail-head-cell {
      flex-direction: column;
      gap: 1px;
      padding: 6px 2px 8px;
      min-height: 52px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-light);
    }
    .avail-head-cell .head-time {
      font-size: 10px;
      font-weight: 500;
      color: var(--text-light);
      font-family: var(--font-accent);
      letter-spacing: 0.2px;
    }
    .avail-head-cell.avail-head-corner { border-bottom-color: transparent; }

    .avail-date-cell {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.3;
      font-weight: 500;
      padding: 2px;
      flex-direction: column;
      gap: 1px;
    }
    .avail-date-cell.weekend {
      color: var(--accent);
      font-weight: 600;
    }
    .avail-date-cell .date-dow {
      font-size: 10px;
      opacity: 0.75;
    }

    .avail-slot-cell {
      border: 2px solid transparent;
      background: var(--chip-bg);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      color: transparent;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
      padding: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .avail-slot-cell:active { transform: scale(0.92); }
    .avail-slot-cell.active {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .avail-actions {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 10px;
    }
    .avail-reset-btn {
      background: transparent;
      border: none;
      color: var(--accent);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      -webkit-tap-highlight-color: transparent;
    }
    .avail-reset-btn:hover { background: var(--accent-soft); }

    /* Tight mobile: shrink date label column + gaps so the grid never overflows */
    @media (max-width: 380px) {
      .avail-thead,
      .avail-tbody {
        grid-template-columns: minmax(52px, 64px) repeat(4, 1fr);
        gap: 3px;
      }
      .avail-thead { padding-bottom: 3px; }
      .avail-date-cell { font-size: 11px; }
      .avail-head-cell { font-size: 12px; }
      .avail-head-cell .head-time { font-size: 9px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="/shared/config.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const WEBHOOK_URL = window.webhookUrl("availability");
    const LOGO_URL = "/logo.png";

    // Day offsets from sent date: +7 ... +21 inclusive (15 dates).
    const DAY_OFFSET_START = 7;
    const DAY_OFFSET_END = 21;

    const TIME_SLOTS = [
      { key: "morning",   icon: "🌅", name: "早上", time: "9:00–12:00",  label: "早上（9:00 – 12:00）" },
      { key: "afternoon", icon: "🌞", name: "下午", time: "12:00–15:00", label: "下午（12:00 – 15:00）" },
      { key: "evening",   icon: "🌆", name: "傍晚", time: "15:00–19:00", label: "傍晚（15:00 – 19:00）" },
      { key: "night",     icon: "🌙", name: "晚上", time: "19:00–23:00", label: "晚上（19:00 – 23:00）" },
    ];
    const SLOT_OPTIONS = TIME_SLOTS.map(s => ({ icon: s.icon, label: s.label }));
    const optionStored = (opt) => (opt.icon || "") + (opt.label || "");
    const SLOT_STORED = TIME_SLOTS.map(s => ({ key: s.key, stored: s.icon + s.label }));

    const MEET_AREA_OPTIONS = [
      { label: "九龍" },
      { label: "香港島" },
      { label: "新界" },
    ];

    const DOW_TC = ["日", "一", "二", "三", "四", "五", "六"];

    function parseISODate(str) {
      if (!str) return null;
      const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(str);
      if (!m) return null;
      const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
      if (isNaN(d.getTime())) return null;
      return d;
    }
    function formatISODate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }
    function addDays(base, n) {
      const d = new Date(base);
      d.setDate(d.getDate() + n);
      return d;
    }
    function buildDates(sentDate) {
      const out = [];
      for (let off = DAY_OFFSET_START; off <= DAY_OFFSET_END; off++) {
        const d = addDays(sentDate, off);
        const dow = d.getDay();
        out.push({
          iso: formatISODate(d),
          label: `${d.getMonth() + 1}月${d.getDate()}日`,
          dow: dow,
          dowLabel: DOW_TC[dow],
          isWeekend: dow === 0 || dow === 6,
        });
      }
      return out;
    }

    /* ── Chip grid (same visual as other forms) ── */
    function MultiChipGrid({ options, value, onToggle }) {
      const selected = Array.isArray(value) ? value : [];
      return (
        <div className="chip-grid">
          {options.map(opt => {
            const stored = optionStored(opt);
            const active = selected.includes(stored);
            return (
              <div
                key={stored}
                className={`chip ${active ? "active" : ""}`}
                onClick={() => onToggle(stored)}
              >
                {opt.icon && <span className="chip-icon">{opt.icon}</span>}
                {opt.label}
              </div>
            );
          })}
        </div>
      );
    }

    /* ── Availability grid (page 2) ── */
    function AvailabilityGrid({ dates, slots, onToggle }) {
      return (
        <div className="avail-table" role="grid" aria-label="每日時段選擇">
          <div className="avail-thead" role="row">
            <div className="avail-head-cell avail-head-corner" aria-hidden="true"></div>
            {TIME_SLOTS.map(s => (
              <div key={s.key} className="avail-head-cell" title={s.label}>
                <span>{s.name}</span>
                <span className="head-time">{s.time}</span>
              </div>
            ))}
          </div>
          <div className="avail-tbody">
            {dates.map(d => (
              <React.Fragment key={d.iso}>
                <div className={`avail-date-cell ${d.isWeekend ? "weekend" : ""}`}>
                  <span>{d.label}</span>
                  <span className="date-dow">({d.dowLabel})</span>
                </div>
                {TIME_SLOTS.map(s => {
                  const on = !!(slots[d.iso] && slots[d.iso][s.key]);
                  return (
                    <button
                      key={s.key}
                      type="button"
                      className={`avail-slot-cell ${on ? "active" : ""}`}
                      aria-pressed={on}
                      aria-label={`${d.label} ${s.label} ${on ? "已選" : "未選"}`}
                      onClick={() => onToggle(d.iso, s.key)}
                    >
                      ✓
                    </button>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }


    function AvailabilityForm() {
      // Parse URL params: ?user=<email>&match=<email>&sent=<YYYY-MM-DD>
      const params = useMemo(() => {
        const p = new URLSearchParams(window.location.search);
        return {
          user: (p.get("user") || "").trim(),
          match: (p.get("match") || "").trim(),
          sent: p.get("sent") || formatISODate(new Date()),
        };
      }, []);

      const sentDate = useMemo(() => parseISODate(params.sent) || new Date(), [params.sent]);
      const dates = useMemo(() => buildDates(sentDate), [sentDate]);

      // Missing required params → hard stop
      const missingParams = !params.user || !params.match;

      const [step, setStep] = useState(0);
      const [done, setDone] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [submitError, setSubmitError] = useState("");
      const [toast, setToast] = useState("");

      const [meetArea, setMeetArea] = useState([]);    // array of stored strings (e.g. "九龍")
      const [areaError, setAreaError] = useState("");
      const [weekday, setWeekday] = useState([]);      // array of stored strings
      const [weekend, setWeekend] = useState([]);
      const [slots, setSlots] = useState({});          // { [iso]: { morning: bool, ... } }
      const [prefillApplied, setPrefillApplied] = useState(false);

      const slotKeysFromStored = (storedArr) =>
        SLOT_STORED.filter(s => storedArr.includes(s.stored)).map(s => s.key);

      const buildPrefill = () => {
        const wdKeys = slotKeysFromStored(weekday);
        const weKeys = slotKeysFromStored(weekend);
        const next = {};
        dates.forEach(d => {
          const use = d.isWeekend ? weKeys : wdKeys;
          const row = {};
          use.forEach(k => { row[k] = true; });
          next[d.iso] = row;
        });
        return next;
      };

      const goStep2 = () => {
        if (meetArea.length < 1) {
          setAreaError("請選擇至少一個地區");
          setToast("仲有 1 題未填 ✏️");
          setTimeout(() => setToast(""), 2200);
          setTimeout(() => {
            const firstErr = document.querySelector(".field-error");
            if (firstErr) {
              const field = firstErr.closest(".field") || firstErr;
              field.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          }, 80);
          return;
        }
        setAreaError("");
        // Seed page 2 on first entry; on re-entry keep user edits untouched.
        if (!prefillApplied) {
          setSlots(buildPrefill());
          setPrefillApplied(true);
        }
        setStep(1);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const goStep1 = () => {
        setStep(0);
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      const toggleMeetArea = (stored) =>
        setMeetArea(a => {
          const next = a.includes(stored) ? a.filter(x => x !== stored) : [...a, stored];
          if (next.length >= 1) setAreaError("");
          return next;
        });
      const toggleWeekday = (stored) =>
        setWeekday(a => a.includes(stored) ? a.filter(x => x !== stored) : [...a, stored]);
      const toggleWeekend = (stored) =>
        setWeekend(a => a.includes(stored) ? a.filter(x => x !== stored) : [...a, stored]);

      const toggleSlot = (iso, slotKey) => {
        setSlots(prev => {
          const row = { ...(prev[iso] || {}) };
          if (row[slotKey]) delete row[slotKey]; else row[slotKey] = true;
          return { ...prev, [iso]: row };
        });
      };

      const resetToPrefill = () => {
        setSlots(buildPrefill());
        setToast("已套用平日／週末預設 ✨");
        setTimeout(() => setToast(""), 2200);
      };

      const buildSelectedSlots = () => {
        const out = [];
        dates.forEach(d => {
          const row = slots[d.iso] || {};
          TIME_SLOTS.forEach(s => {
            if (row[s.key]) out.push({ date: d.iso, slot: s.key });
          });
        });
        return out;
      };

      const submit = async () => {
        setSubmitting(true);
        setSubmitError("");

        const selected = buildSelectedSlots();

        const body = {
          user_email: params.user,
          match_email: params.match,
          pair_key: [params.user, params.match].map(e => e.toLowerCase()).sort().join("|"),
          sent_date: formatISODate(sentDate),
          meet_areas: meetArea,
          weekday_availability: weekday,
          weekend_availability: weekend,
          selected_slots: selected,
          total_slots: selected.length,
        };

        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 60000);
          const res = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
            signal: controller.signal,
          });
          clearTimeout(timeout);

          let data = null;
          try { data = await res.json(); } catch (_) { /* non-JSON ok */ }

          if (res.ok && (!data || data.success !== false)) {
            setDone(true);
            setSubmitting(false);
            window.scrollTo({ top: 0, behavior: "smooth" });
            return;
          }
          const msg = (data && (data.error || data.message)) || "提交失敗,請稍後再試";
          setSubmitError(msg);
          setSubmitting(false);
        } catch (err) {
          console.error("Submit error:", err);
          setSubmitError(err.name === "AbortError" ? "提交超時,請檢查網絡後再試" : "網絡連線錯誤,請再試");
          setSubmitting(false);
        }
      };

      if (missingParams) {
        return (
          <div className="form-root">
            <div className="form-card">
              <div className="success-screen">
                <div className="success-icon" style={{ background: "var(--red-bg)" }}>📧</div>
                <div className="success-title">請從 email 連結開啟</div>
                <div className="success-subtitle">
                  呢張表單需要由 email 入面嘅專屬連結打開,<br/>
                  先可以幫你同對方對返時間。
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (done) {
        return (
          <div className="form-root">
            <div className="form-card">
              <div className="success-screen">
                <div className="success-icon">✓</div>
                <div className="success-title">多謝你嘅回覆 🌸</div>
                <div className="success-subtitle">
                  我哋會對返對方嘅空檔,<br/>
                  再 email 通知你最終嘅見面安排。
                </div>
              </div>
            </div>
          </div>
        );
      }

      const STEP_TOTAL = 2;
      const progressPct = ((step + 1) / STEP_TOTAL) * 100;

      return (
        <>
          <div className={`toast ${toast ? "show" : ""}`}>{toast}</div>
          <div className="form-root">
            <div className="form-card">
              {submitting && (
                <div className="submitting-overlay">
                  <div className="spinner" />
                  <div style={{ fontSize: 15, color: "#666", fontWeight: 600 }}>提交緊⋯⋯</div>
                  <div style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>請稍等 🙏</div>
                </div>
              )}

              <div className="form-header">
                <img src={LOGO_URL} alt="Link in HK" className="logo-img" />
                <div className="step-indicator">{step + 1} / {STEP_TOTAL}</div>
              </div>

              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progressPct}%` }} />
              </div>

              {step === 0 && (
                <>
                  <div className="step-header">
                    <div className="step-title">🗓 幾時方便見面？</div>
                    <div className="step-subtitle">先話畀我哋知你平日同週末通常嘅空檔</div>
                  </div>
                  <div className="step-body">
                    <div className="step-content">
                      <div className="field">
                        <div className="field-label">想喺邊區見面？（可多選,最少 1 項）</div>
                        <MultiChipGrid options={MEET_AREA_OPTIONS} value={meetArea} onToggle={toggleMeetArea} />
                        {areaError && <div className="field-error">{areaError}</div>}
                      </div>

                      <div className="field">
                        <div className="field-label">你平日通常邊啲時段有空？（可多選）</div>
                        <MultiChipGrid options={SLOT_OPTIONS} value={weekday} onToggle={toggleWeekday} />
                      </div>

                      <div className="field">
                        <div className="field-label">你週末通常邊啲時段有空？（可多選）</div>
                        <MultiChipGrid options={SLOT_OPTIONS} value={weekend} onToggle={toggleWeekend} />
                      </div>
                    </div>
                  </div>
                  <div className="nav-row">
                    <button className="nav-btn primary" onClick={goStep2}>繼續</button>
                  </div>
                </>
              )}

              {step === 1 && (
                <>
                  <div className="step-header">
                    <div className="step-title">🗓 逐日確認你嘅空檔</div>
                    <div className="step-subtitle">由 {dates[0].label} 至 {dates[dates.length - 1].label}</div>
                  </div>
                  <div className="step-body">
                    <div className="step-content">
                      <div className="avail-intro">
                        我哋已經根據你上一頁嘅選擇,預先幫你填咗每一日嘅時段。<br/>
                        請逐日檢查,撳一下就可以加／減;確保係你真正方便嘅時間 ✓
                      </div>

                      <div className="avail-actions">
                        <button type="button" className="avail-reset-btn" onClick={resetToPrefill}>
                          ↻ 重新套用預設
                        </button>
                      </div>

                      <AvailabilityGrid dates={dates} slots={slots} onToggle={toggleSlot} />

                      {submitError && (
                        <div className="field-error" style={{ marginTop: 12, fontSize: 13 }}>
                          {submitError}
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="nav-row">
                    <button className="nav-btn secondary" onClick={goStep1} disabled={submitting}>上一頁</button>
                    <button className="nav-btn primary" onClick={submit} disabled={submitting}>
                      {submitting ? "提交緊⋯⋯" : "提交 🎉"}
                    </button>
                  </div>
                </>
              )}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AvailabilityForm />);
  </script>
</body>
</html>
