<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Link in HK — 登記完成</title>
  <meta name="description" content="多謝你登記 Link in HK！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f0f0f0;
      --card: #f7f7f7;
      --white: #ffffff;
      --text: #333;
      --text-light: #888;
      --accent: #9060E0;
      --accent-pink: #FF6EB4;
      --accent-gradient: linear-gradient(135deg, #FF6EB4, #A259FF);
      --green-bg: #e8f8ee;
      --green-text: #1a7a3a;
      --yellow-bg: #fefce8;
      --yellow-border: #eab308;
      --radius: 20px;
      --radius-sm: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .page-root {
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .page-card {
      width: 100%;
      max-width: 480px;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }
    .page-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: var(--accent-gradient);
      z-index: 1;
    }

    /* ── Success section ── */
    .success-section {
      padding: 48px 24px 20px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--green-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 24px;
      animation: popIn 0.4s ease both 0.2s;
    }
    .success-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .success-subtitle {
      font-size: 14px;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ── Next step card ── */
    .next-step-section {
      padding: 0 24px 28px;
      animation: fadeUp 0.5s ease both 0.3s;
    }
    .next-step-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 24px;
      border: 2px solid #e8e8e8;
    }
    .next-step-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(144,96,224,0.08);
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .next-step-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .next-step-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      background: var(--accent-gradient);
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(144, 96, 224, 0.3);
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(144, 96, 224, 0.4);
    }
    .cta-btn:active { transform: scale(0.98); }

    .cta-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      background: #efefef;
      color: #666;
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-secondary:hover { background: #e0e0e0; }

    /* ── Callout ── */
    .callout {
      margin: 0 24px 24px;
      background: var(--yellow-bg);
      border-left: 4px solid var(--yellow-border);
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.6;
      color: #666;
      animation: fadeUp 0.5s ease both 0.5s;
    }
    .callout strong { color: #92620a; }

    /* ── Footer ── */
    .thankyou-footer {
      padding: 16px 24px 28px;
      text-align: center;
      animation: fadeUp 0.5s ease both 0.6s;
    }
    .footer-text {
      font-size: 12px;
      color: var(--text-light);
      line-height: 1.6;
    }
    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Mobile ── */
    @media (max-width: 500px) {
      .page-root { padding: 12px 8px 40px; }
      .page-card { border-radius: 16px; }
      .success-section { padding: 40px 20px 16px; }
      .next-step-section { padding: 0 20px 24px; }
      .callout { margin: 0 20px 20px; }
    }
  </style>
</head>
<body>
  <div class="page-root">
    <div class="page-card">

      <!-- Success message -->
      <div class="success-section">
        <div class="success-icon">✅</div>
        <div class="success-title">登記完成喇！🎉</div>
        <div class="success-subtitle">
          多謝你嘅信任 🤍<br/>
          接下來交俾我哋，我哋會認真了解你，<br/>
          為你搵到最適合嘅人 💚
        </div>
      </div>

      <!-- Next step: fill in 理想型 -->
      <div class="next-step-section">
        <div class="next-step-card">
          <div class="next-step-badge">📌 下一步</div>
          <div class="next-step-title">填寫你嘅理想型</div>
          <div class="next-step-desc">
            去會員中心嘅「我想要」，話俾我哋知你理想中嘅另一半係點樣 —
            年齡、身高、性格⋯⋯填得越仔細，我哋配得越準 ✨
          </div>
          <a href="https://www.linkinhk.com/dashboard#ideal" class="cta-btn">
            前往會員中心 · 我想要 💜
          </a>
          <a href="https://ig.me/m/linkinhk" class="cta-secondary" target="_blank" rel="noopener noreferrer">
            Follow @linkinhk 📱
          </a>
        </div>
      </div>

      <!-- Payment callout -->
      <div class="callout">
        <strong>💡 提醒：</strong>如果你仲未完成會員費付款（HK$198），記得經 IG DM 將收據截圖發俾我哋，我哋先可以將你加入配對 🙏
      </div>

      <!-- Footer -->
      <div class="thankyou-footer">
        <div class="footer-text">
          有任何問題？隨時 DM 我哋 <a href="https://ig.me/m/linkinhk" target="_blank">@linkinhk</a> 📱
          <br/>Link in HK · 香港最有溫度嘅配對服務
        </div>
      </div>

    </div>
  </div>
</body>
</html>
