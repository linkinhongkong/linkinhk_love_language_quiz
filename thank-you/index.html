<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Link in HK — 登記完成</title>
  <meta name="description" content="多謝你登記 Link in HK！">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/shared/design-system.css">
  <script src="/shared/config.js"></script>
  <style>
    /* Thank-you page-specific styles. Tokens + shared components come from design-system.css. */

    .page-root {
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    .success-section {
      padding: 48px 24px 20px;
      text-align: center;
      animation: fadeUp 0.5s ease both;
    }
    .success-icon { animation: popIn 0.4s ease both 0.2s; }

    .next-step-section {
      padding: 0 24px 28px;
      animation: fadeUp 0.5s ease both 0.3s;
    }
    .next-step-card {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 24px;
      border: 2px solid var(--border-light);
    }
    .next-step-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(144,96,224,0.08);
      padding: 4px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .next-step-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .next-step-desc { font-size: 14px; color: var(--text-hint); line-height: 1.7; margin-bottom: 20px; }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      background: var(--accent-gradient);
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      font-family: inherit;
      box-shadow: var(--shadow-accent);
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-accent-hover); }
    .cta-btn:active { transform: scale(0.98); }

    .cta-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      background: var(--chip-bg);
      color: var(--text-hint);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      margin-top: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-secondary:hover { background: var(--border); }

    .callout {
      margin: 0 24px 24px;
      background: var(--yellow-bg);
      border-left: 4px solid var(--yellow-border);
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-hint);
      animation: fadeUp 0.5s ease both 0.5s;
    }
    .callout strong { color: #92620a; }

    .payment-section {
      display: flex;
      gap: 12px;
      padding: 0 24px 24px;
      animation: fadeUp 0.5s ease both 0.55s;
    }
    .payment-card {
      flex: 1;
      min-width: 0;
      background: var(--white);
      border: 2px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 16px;
      text-align: center;
    }
    .payment-header {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 10px;
    }
    .payment-number {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--chip-bg);
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .payment-number:hover { background: var(--border); }
    .payment-number.copied { background: var(--accent-soft); color: var(--accent); }
    .payment-number .copy-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .payment-helper {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    @media (max-width: 380px) {
      .payment-section { flex-direction: column; }
    }

    .thankyou-footer {
      padding: 16px 24px 28px;
      text-align: center;
      animation: fadeUp 0.5s ease both 0.6s;
    }
    .footer-text { font-size: 12px; color: var(--text-light); line-height: 1.6; }
    .footer-text a { color: var(--accent); text-decoration: none; font-weight: 500; }

    @media (max-width: 500px) {
      .page-root { padding: 12px 8px 40px; }
      .success-section { padding: 40px 20px 16px; }
      .next-step-section { padding: 0 20px 24px; }
      .callout { margin: 0 20px 20px; }
      .payment-section { padding: 0 20px 20px; }
    }
  </style>
</head>
<body>
  <div class="page-root">
    <div class="page-card">

      <!-- Success message -->
      <div class="success-section">
        <div class="success-icon">✅</div>
        <div class="success-title">登記完成喇！🎉</div>
        <div class="success-subtitle">
          多謝你嘅信任 🤍<br/>
          接下來交俾我哋，我哋會認真了解你，<br/>
          為你搵到最適合嘅人 💚
        </div>
      </div>

      <!-- Next step: fill in 理想型 -->
      <div class="next-step-section">
        <div class="next-step-card">
          <div class="next-step-badge">📌 下一步</div>
          <div class="next-step-title">填寫你嘅理想型</div>
          <div class="next-step-desc">
            話俾我哋知你理想中嘅另一半係點樣 —
            年齡、身高、性格⋯⋯填得越仔細，我哋配得越準 ✨
          </div>
          <a href="https://www.linkinhk.com/dashboard#ideal" class="cta-btn">
            前往會員中心
          </a>
          <a href="https://ig.me/m/linkinhk" class="cta-secondary" target="_blank" rel="noopener noreferrer">
            Follow @linkinhk 📱
          </a>
        </div>
      </div>

      <!-- Payment callout -->
      <div class="callout">
        <strong>💡 提醒：</strong>完成付款記得IG DM我哋，我哋先可以將你加入配對 🙏
      </div>

      <!-- Payment methods -->
      <div class="payment-section">
        <div class="payment-card">
          <div class="payment-header">Payme</div>
          <button type="button" class="payment-number" data-copy="91878330" aria-label="複製 Payme 號碼 91878330">
            <span class="payment-number-text">91878330</span>
            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <div class="payment-helper"></div>
        </div>
        <div class="payment-card">
          <div class="payment-header">FPS</div>
          <div class="payment-helper">LEUNG Y** T***</div>
          <button type="button" class="payment-number" data-copy="91878330" aria-label="複製 FPS 號碼 91878330">
            <span class="payment-number-text">91878330</span>
            <svg class="copy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Footer -->
      <div class="thankyou-footer">
        <div class="footer-text">
          有任何問題？隨時 DM 我哋 <a href="https://ig.me/m/linkinhk" target="_blank">@linkinhk</a> 📱
          <br/>Link in HK · 香港最有溫度嘅配對服務
        </div>
      </div>

    </div>
  </div>
  <script>
    document.querySelectorAll('.payment-number').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var text = btn.dataset.copy || '';
        var label = btn.querySelector('.payment-number-text');
        var original = label.textContent;

        var done = function () {
          label.textContent = '已複製 ✓';
          btn.classList.add('copied');
          setTimeout(function () {
            label.textContent = original;
            btn.classList.remove('copied');
          }, 1500);
        };

        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(text).then(done).catch(fallback);
        } else {
          fallback();
        }

        function fallback() {
          var ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'absolute';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); done(); } catch (e) {}
          document.body.removeChild(ta);
        }
      });
    });
  </script>
</body>
</html>
