    color: white;
    box-shadow: 0 4px 16px rgba(144, 96, 224, 0.3);
  }
  .nav-btn.primary:hover {
    box-shadow: 0 6px 20px rgba(144, 96, 224, 0.4);

  }
  .nav-btn:disabled {

    cursor: not-allowed;
    transform: none !important;

  /* ── Range bar (visual only) + inputs ── */

    width: 100%;
    height: 6px;
    position: relative;
    margin: 8px 0 12px;
    border-radius: 3px;

  .range-slider-track {

    top: 0; left: 0; right: 0;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
  }
  .range-slider-fill {
    position: absolute;
    top: 0;
    height: 6px;

  .range-inputs {

  .range-input-box {

    align-items: center;

    border-radius: var(--radius-sm);
    background: var(--white);
    padding: 8px 12px;

  .range-input-box:focus-within { border-color: var(--accent); }
  .range-input {
    border: none;
    outline: none;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: var(--text);
    width: 100%;
    background: transparent;
    -webkit-appearance: none;
  }
  .range-input-unit {
    font-size: 13px;
    color: var(--text-light);
    margin-left: 4px;
    flex-shrink: 0;
  }
  .range-input-dash {
    color: #ccc;
    font-size: 14px;
    margin-top: 18px;
    flex-shrink: 0;
  }

  /* ── Callout ── */
  .callout-yellow {
    background: var(--yellow-bg);
    border-left: 4px solid var(--yellow-border);
    padding: 12px 16px;
    border-radius: 0 8px 8px 0;
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 20px;
    color: #666;
  }

  /* ── Error ── */
  .field-error { font-size: 12px; color: #e53e3e; margin-top: 6px; }

  .submit-error-box {
    margin: 12px 0 4px;
    padding: 12px 14px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: 10px;
    font-size: 13px;
    color: #b91c1c;
    line-height: 1.6;
  }
  .error-report-link {
    margin-top: 8px;
    font-size: 12px;
    color: #b91c1c;
    line-height: 1.6;
  }
  .error-report-link a {
    color: #9060e0;
    font-weight: 600;
    text-decoration: none;
  }
  .error-report-link a:hover {
    text-decoration: underline;
    text-underline-offset: 2px;
  }

  /* ── Divider ── */
  .section-divider { height: 1px; background: #e8e8e8; margin: 4px 0 22px; }

  /* ── Transitions ── */
  .step-content { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── Submitting overlay ── */
  .submitting-overlay {
    position: absolute;
    inset: 0;
    background: rgba(247,247,247,0.92);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 10;
    border-radius: var(--radius);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--chip-bg);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Success ── */
  .success-screen { padding: 60px 24px; text-align: center; }
  .success-icon {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--green-bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 0 auto 24px;
  }
  .success-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .success-subtitle { font-size: 14px; color: var(--text-light); line-height: 1.7; }
  .success-cta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 28px;
    padding: 14px 28px;
    border-radius: var(--radius-sm);
    background: var(--accent-gradient);
    color: white;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    box-shadow: 0 4px 16px rgba(144, 96, 224, 0.3);
    transition: all 0.2s;
  }
  .success-cta:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(144, 96, 224, 0.4); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #e53e3e;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(229, 62, 62, 0.35);
    z-index: 100;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── Mobile tweaks ── */
  @media (max-width: 500px) {
    .form-root { padding: 12px 8px 40px; }
    .form-card { border-radius: 16px; }
    .step-body { padding: 16px 20px 20px; }
    .nav-row { padding: 8px 20px 24px; }
    .form-header { padding: 24px 20px 0; }
    .progress-bar { margin: 14px 20px 0; }
    .step-header { padding: 20px 20px 4px; }
    .step-title { font-size: 20px; }
  }
`;


/* ═══════════════════════════════════════════
   COMPONENT
   ═══════════════════════════════════════════ */
function LinkInSignup() {
  const [step, setStep] = useState(0);
  const [submitting, setSubmitting] = useState(false);
  const [submitted, setSubmitted] = useState(false);
  const [errors, setErrors] = useState({});
  const [toast, setToast] = useState("");
  const [submitError, setSubmitError] = useState("");
  const fileInputRef = useRef(null);
  const cardRef = useRef(null);
  // Keyed by original File so submit() can resolve compressed blobs without depending on stale closure state.
  const photoCompressions = useRef(new Map());

  const [form, setForm] = useState({
    // Page 1 — basics: name, sex, orientation, occupation, uni, DOB, height
    name: "",
    sex: "", sexualOrientation: "",
    occupation: "", occupationOther: "",
    university: "", universityOther: "", overseasUni: "",
    birthDay: "", birthMonth: "", birthYear: "",
    height: "",
    // Page 2 — personality: MBTI, love language
    mbti: "", knowLoveLang: "", loveLangRank: LOVE_LANGUAGES.map(l => l.id),
    // Page 3 — lifestyle: smoke, drink, religion, kids
    drinking: "", smoking: "",
    religion: "", religionOther: "",
    kidsPref: "",
    // Page 4 — interests
    interests: [],
    // Page 5 — activities (new)
    activities: [], activitiesOther: "",
    // Page 6 — photos (1-3)
    photos: [], photoPreviews: [],
    // Page 6 — contact: phone, email, IG
    whatsapp: "", email: "", instagram: "",
    // Page 7 — bio
    selfIntro: "",
    // Page 8 — final: referral, IG understand, consent
    referral: [], consent: false,
  });

  /* ── State helpers ── */
  const set = useCallback((key, val) => {
    setForm(prev => ({ ...prev, [key]: val }));
    setErrors(prev => ({ ...prev, [key]: undefined }));
  }, []);

  const toggleMulti = useCallback((key, val, max) => {
    setForm(prev => {
      const arr = prev[key];
      if (arr.includes(val)) return { ...prev, [key]: arr.filter(v => v !== val) };
      if (max && arr.length >= max) return prev;
      return { ...prev, [key]: [...arr, val] };
    });
    setErrors(prev => ({ ...prev, [key]: undefined }));
  }, []);

  const toggleMultiWithNone = useCallback((key, val, noneVal = "無所謂") => {
    setForm(prev => {
      const arr = prev[key];
      if (val === noneVal) return { ...prev, [key]: [noneVal] };
      const without = arr.filter(v => v !== noneVal);
      if (without.includes(val)) return { ...prev, [key]: without.filter(v => v !== val) };
      return { ...prev, [key]: [...without, val] };
    });
  }, []);

  const moveLang = useCallback((idx, dir) => {
    setForm(prev => {
      const arr = [...prev.loveLangRank];
      const newIdx = idx + dir;
      if (newIdx < 0 || newIdx >= arr.length) return prev;
      [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
      return { ...prev, loveLangRank: arr };
    });
  }, []);

  const handlePhoto = (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;

    const MAX = 3;
    const currentCount = form.photos.length;
    const remaining = MAX - currentCount;
    if (remaining <= 0) {
      alert("最多只可以上傳 3 張照片 🙏");
      return;
    }
    const toAdd = files.slice(0, remaining);

    // OOM guard for low-end phones; compression handles normal sizing.
    for (const f of toAdd) {
      if (f.size > 50 * 1024 * 1024) {
        alert(`檔案「${f.name}」太大，請上傳 50MB 以下嘅圖片 🙏`);
        return;
      }
    }

    // read previews
    const readPromises = toAdd.map(file => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (ev) => resolve(ev.target.result);
      reader.readAsDataURL(file);
    }));

    // Run compression in parallel with steps 6–8 so the user never sees a spinner.
    toAdd.forEach((file) => {
      photoCompressions.current.set(file, window.compressImage(file));
    });

    Promise.all(readPromises).then(previews => {
      setForm(prev => ({
        ...prev,
        photos: [...prev.photos, ...toAdd],
        photoPreviews: [...prev.photoPreviews, ...previews],
      }));
      setErrors(prev => ({ ...prev, photos: undefined }));
    });

    // reset input so same file can be reselected
    if (fileInputRef.current) fileInputRef.current.value = "";
  };

  const removePhoto = (idx) => {
    setForm(prev => {
      const removed = prev.photos[idx];
      if (removed) photoCompressions.current.delete(removed);
      return {
        ...prev,
        photos: prev.photos.filter((_, i) => i !== idx),
        photoPreviews: prev.photoPreviews.filter((_, i) => i !== idx),
      };
    });
  };

  /* ── Validation ── */
  const getStepErrors = () => {
    const e = {};
    if (step === 0) {
      if (!form.name.trim()) e.name = "請輸入名字";
      if (!form.sex) e.sex = "請選擇性別";
      if (!form.sexualOrientation) e.sexualOrientation = "請選擇性取向";
      if (!form.occupation) e.occupation = "請選擇職業";
      if (form.occupation === "other_occ" && !form.occupationOther.trim()) e.occupationOther = "請填寫你嘅職業";
      if (!form.university) e.university = "請選擇學院";
      if (form.university === "other_uni" && !form.universityOther.trim()) e.universityOther = "請填寫";
      if (form.university === "overseas" && !form.overseasUni.trim()) e.overseasUni = "請填寫";
      if (!form.birthDay || !form.birthMonth || !form.birthYear) e.birthday = "請選擇完整生日";
      if (!form.height.trim()) e.height = "請輸入身高";
      else if (isNaN(Number(form.height)) || Number(form.height) < 100 || Number(form.height) > 250) e.height = "請輸入合理身高（100-250cm）";
    } else if (step === 1) {
      if (!form.mbti) e.mbti = "請選擇 MBTI";
      if (!form.knowLoveLang) e.knowLoveLang = "請選擇";
    } else if (step === 2) {
      if (!form.drinking) e.drinking = "請選擇飲酒習慣";
      if (!form.smoking) e.smoking = "請選擇吸煙習慣";
      if (!form.religion) e.religion = "請選擇信仰";
      if (form.religion === "other_religion" && !form.religionOther.trim()) e.religionOther = "請填寫你嘅信仰";
      if (!form.kidsPref) e.kidsPref = "請選擇";
    } else if (step === 4) {
      if (form.activities.length < 1) e.activities = "請選擇至少 1 個";
      if (form.activities.includes(ACTIVITY_OTHER_ID) && !form.activitiesOther.trim()) e.activitiesOther = "請填寫你嘅想法";
    } else if (step === 5) {
      if (!form.photos || form.photos.length < 1) e.photos = "請上傳至少一張照片";
    } else if (step === 6) {
      if (!form.whatsapp.trim()) e.whatsapp = "請輸入 WhatsApp 號碼";
      if (!form.email.trim()) e.email = "請輸入電郵地址";
      else if (!/\S+@\S+\.\S+/.test(form.email)) e.email = "電郵格式唔正確";
      if (!form.instagram.trim()) e.instagram = "請輸入 Instagram 名稱";
    } else if (step === 8) {
      if (form.referral.length === 0) e.referral = "請選擇至少一個";
      if (!form.consent) e.consent = "請同意會員條款先繼續";
    }
    return e;
  };

  const validateStep = () => {
    const e = getStepErrors();
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  /* ── Navigation ── */
  const scrollToTop = () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  useEffect(() => {
    scrollToTop();
  }, [step]);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2800);
  };

  const next = () => {
    const e = getStepErrors();
    setErrors(e);
    const errCount = Object.keys(e).length;
    if (errCount > 0) {
      showToast(`仲有 ${errCount} 題未填 ✏️`);
      setTimeout(() => {
        const firstErr = document.querySelector('.field-error');
        if (firstErr) {
          const field = firstErr.closest('.field') || firstErr;
          field.scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 80);
      return;
    }
    if (step < STEPS.length - 1) {
      setStep(s => s + 1);
    }
  };
  const prev = () => {
    if (step > 0) {
      setStep(s => s - 1);
    }
  };

  /* ── Submit ── */
  const submit = async () => {
    if (!validateStep()) return;
    setSubmitting(true);
    setSubmitError("");
    try {
      /* ── Mapping helpers ── */
      const occMap = {};
      OCCUPATIONS.forEach(o => { occMap[o.id] = o.icon + o.label; });

      const uniMap = {};
      UNIVERSITIES.forEach(u => { uniMap[u.id] = u.label; });

      const religionMap = {};
      RELIGIONS.forEach(r => { religionMap[r.id] = r.label; });

      const mbtiEmojiMap = {
        INTJ:"🟣",INTP:"🟣",ENTJ:"🔴",ENTP:"🔴",
        INFJ:"🟢",INFP:"🟢",ENFJ:"🟢",ENFP:"🟢",
        ISTJ:"🔵",ISFJ:"🔵",ESTJ:"🔵",ESFJ:"🔵",
        ISTP:"🟡",ISFP:"🟡",ESTP:"🟡",ESFP:"🟡",
      };

      const loveLangMap = {
        words: "肯定的言語 (Words of Affirmation)",
        time: "精心時刻 (Quality Time)",
        gifts: "接受禮物 (Receiving Gifts)",
        service: "服務行動 (Acts of Service)",
        touch: "身體接觸 (Physical Touch)",
      };

      const interestMap = {};
      Object.values(INTERESTS).flat().forEach(i => { interestMap[i.id] = i.icon + i.label; });

      const activityMap = {};
      Object.values(ACTIVITIES).flat().forEach(a => { activityMap[a.id] = a.icon + " " + a.label; });

      const drinkMap = {};
      DRINKING.forEach(d => { drinkMap[d.id] = d.label; });

      const smokeMap = {};
      SMOKING.forEach(s => { smokeMap[s.id] = s.label; });

      const kidsMap = {};
      KIDS_PREF.forEach(k => { kidsMap[k.id] = k.label; });

      /* ── Build values (with "其他" overrides) ── */
      const birthday = form.birthYear + "-" + form.birthMonth.padStart(2,"0") + "-" + form.birthDay.padStart(2,"0");
      const cleanIG = form.instagram.trim().toLowerCase().replace(/^@/, "");

      const mbtiVal = form.mbti === "unsure" ? "不清楚" : (mbtiEmojiMap[form.mbti] || "") + form.mbti;

      const loveLangVal = form.knowLoveLang === "yes"
        ? form.loveLangRank.map(id => loveLangMap[id] || id).join(", ")
        : "";

      // "其他" overrides — raw user text replaces the mapped label
      const occupationVal = form.occupation === "other_occ"
        ? form.occupationOther.trim()
        : (occMap[form.occupation] || form.occupation);

      const universityVal = form.university === "other_uni"
        ? form.universityOther.trim()
        : form.university === "overseas"
        ? "海外升學 — " + form.overseasUni.trim()
        : (uniMap[form.university] || form.university);

      const religionVal = form.religion === "other_religion"
        ? form.religionOther.trim()
        : (religionMap[form.religion] || form.religion);

      const payload = new FormData();

      // Wait for any compressions still in flight; usually a no-op by this step.
      const finalPhotos = await Promise.all(
        form.photos.map(p => photoCompressions.current.get(p) || Promise.resolve(p))
      );

      // Photos: my-photo-1, my-photo-2, my-photo-3
      finalPhotos.forEach((p, i) => {
        payload.append(`my-photo-${i + 1}`, p, p.name);
      });

      // DB column name → display value
      payload.append("Submitted at", new Date().toISOString());
      payload.append("name", form.name);
      payload.append("sex", form.sex === "male" ? "男性" : "女性");
      payload.append("sexual-orientation", form.sexualOrientation === "straight" ? "異性戀" : form.sexualOrientation === "gay" ? "同性戀" : "雙性戀");
      payload.append("my-age", birthday);
      payload.append("email", form.email);
      payload.append("phone", form.whatsapp);
      payload.append("instagram", cleanIG);
      payload.append("my-occupation", occupationVal);
      payload.append("my-height", form.height);
      payload.append("my-uni", universityVal);
      payload.append("my-religion", religionVal);
      payload.append("my-MBTI", mbtiVal);
      payload.append("my-love-language", loveLangVal);
      payload.append("my-hobby", form.interests.map(id => interestMap[id] || id).join(", "));
      payload.append("my-activities", form.activities.filter(id => id !== ACTIVITY_OTHER_ID).map(id => activityMap[id] || id).join(", "));
      payload.append("my-activities-others", form.activities.includes(ACTIVITY_OTHER_ID) ? form.activitiesOther.trim() : "");
      payload.append("my-drinking-habbit", drinkMap[form.drinking] || form.drinking);
      payload.append("my-smoking-habbit", smokeMap[form.smoking] || form.smoking);
      payload.append("my-kids-expectation", kidsMap[form.kidsPref] || form.kidsPref);
      payload.append("my-bio", form.selfIntro);

      // Meta
      payload.append("touchpoint", JSON.stringify(form.referral));

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 60000);

      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        body: payload,
        signal: controller.signal,
      });
      clearTimeout(timeout);

      if (res.ok) {
        window.location.href = "/thank-you";
        return;
      } else {
        setSubmitError("提交失敗，請稍後再試 🙏");
      }
    } catch (err) {
      console.error("Submit error:", err);
      if (err.name === "AbortError") {
        setSubmitError("提交超時，請檢查網絡後再試 🙏");
      } else {
        setSubmitError("提交失敗，請檢查網絡後再試 🙏");
      }
    } finally {
      setSubmitting(false);
    }
  };


  /* ═══════════════════════════════════════════
     RENDER HELPERS
     ═══════════════════════════════════════════ */
  const ErrorMsg = ({ field }) => errors[field] ? <div className="field-error">{errors[field]}</div> : null;

  const DualRange = ({ label, unit, min, max, valMin, valMax, onMinChange, onMaxChange }) => {
    const [editMin, setEditMin] = useState(null);
    const [editMax, setEditMax] = useState(null);

    const pctMin = ((valMin - min) / (max - min)) * 100;
    const pctMax = ((valMax - min) / (max - min)) * 100;

    return (
      <div className="field">
        <div className="field-label">{label}</div>
        <div className="range-slider">
          <div className="range-slider-track" />
          <div className="range-slider-fill" style={{ left: pctMin + "%", width: (pctMax - pctMin) + "%" }} />
        </div>
        <div className="range-inputs">
          <div className="range-input-group">
            <div className="range-input-label">最低</div>
            <div className="range-input-box">
              <input
                type="text"
                inputMode="numeric"
                className="range-input"
                value={editMin !== null ? editMin : valMin}
                onFocus={e => { setEditMin(String(valMin)); e.target.select(); }}
                onChange={e => setEditMin(e.target.value)}
                onBlur={() => {
                  const n = parseInt(editMin);
                  if (!isNaN(n)) onMinChange(Math.max(min, Math.min(n, valMax - 1)));
                  setEditMin(null);
                }}
              />
              <span className="range-input-unit">{unit}</span>
            </div>
          </div>
          <div className="range-input-dash">—</div>
          <div className="range-input-group">
            <div className="range-input-label">最高</div>
            <div className="range-input-box">
              <input
                type="text"
                inputMode="numeric"
                className="range-input"
                value={editMax !== null ? editMax : valMax}
                onFocus={e => { setEditMax(String(valMax)); e.target.select(); }}
                onChange={e => setEditMax(e.target.value)}
                onBlur={() => {
                  const n = parseInt(editMax);
                  if (!isNaN(n)) onMaxChange(Math.min(max, Math.max(n, valMin + 1)));
                  setEditMax(null);
                }}
              />
              <span className="range-input-unit">{unit}</span>
            </div>
          </div>
        </div>
      </div>
    );

    </div>
  );

  const stepRenderers = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5, renderStep6, renderStep7, renderStep8];


  /* ═══════════════════════════════════════════
     RENDER
     ═══════════════════════════════════════════ */

  if (submitted) {
    return (
      <>
        <style>{STYLES}</style>
        <div className="form-root">
          <div className="form-card">
            <div className="success-screen">
              <div className="success-icon">✅</div>
              <div className="success-title">登記完成喇！🎉</div>
              <div className="success-subtitle">
                多謝你嘅信任 🤍<br />
                接下來交俾我哋，我哋會認真了解你，<br />
                為你搵到最適合嘅人 💚
              </div>
              <a href="https://ig.me/m/linkinhk" className="success-cta" target="_blank" rel="noopener noreferrer">
                Follow @linkinhk 📱
              </a>
            </div>
          </div>
        </div>
      </>
    );
  }

  return (
    <>
      <style>{STYLES}</style>
      <div className={`toast ${toast ? "show" : ""}`}>{toast}</div>
      <div className="form-root">
        <div className="form-card" ref={cardRef}>
          {submitting && (
            <div className="submitting-overlay">
              <div className="spinner" />
              <div style={{ fontSize: 15, color: "#666", fontWeight: 600 }}>提交緊⋯⋯</div>
              <div style={{ fontSize: 12, color: "#aaa", marginTop: 4 }}>通常需要約 10-30 秒，請稍等 🙏</div>
            </div>
          )}

          <div className="form-header">
            <img src={LOGO_URL} alt="Link in HK" className="logo-img" />
            <div className="step-indicator">{step + 1} / {STEPS.length}</div>
          </div>

          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${((step + 1) / STEPS.length) * 100}%` }} />
          </div>

          <div className="step-header">
            <div className="step-title">{STEPS[step].title}</div>
            <div className="step-subtitle">{STEPS[step].subtitle}</div>
          </div>

          <div className="step-body">
            {stepRenderers[step]()}
            {submitError && step === STEPS.length - 1 && (
              <div className="submit-error-box">
                {submitError}
                <ErrorReportLink />
              </div>
            )}
          </div>

          <div className="nav-row">
            {step > 0 && <button className="nav-btn secondary" onClick={prev}>上一頁</button>}
            {step < STEPS.length - 1 ? (
              <button className="nav-btn primary" onClick={next}>繼續</button>
            ) : (
              <button className="nav-btn primary" onClick={submit} disabled={submitting}>
                {submitting ? "提交緊⋯⋯" : "提交 🎉"}
              </button>
            )}
          </div>
        </div>
      </div>
    </>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<LinkInSignup />);
  </script>
</body>
</html>
